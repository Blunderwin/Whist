<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Contract Whist · The Scorekeeper</title>
<meta name="description" content="A pub scorekeeper for Contract Whist — classic scoring, plus an optional drinking Twist mode. Bids in, pints poured, last hand decides it." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     THEME — Stout & Cards
     Palette (named hex):
       --stout  #14100c  body of the pint / background
       --mid    #241b13  panel brown
       --head   #efe2c4  the cream head / paper / primary ink
       --gold   #c79a3b  harp gold / contract made
       --ruby   #a32d27  heart & diamond red / warnings
       --ash    #93876c  muted ink
     Type:
       Cinzel     — engraved display caps (titles, round)
       Spectral   — body serif (menu / scorepad feel)
       Space Mono — figures, so scores align like a till receipt
     ============================================================ */
  :root{
    --stout:#14100c; --mid:#241b13; --panel:#2c2118;
    --head:#efe2c4; --paper:#f3ead2; --gold:#c79a3b; --gold-dim:#8d6f2c;
    --ruby:#a32d27; --ash:#93876c; --line:rgba(239,226,196,.16);
    --ok:#7a9a4e;
    --shadow:0 18px 40px -22px rgba(0,0,0,.85);
    --r:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:
      radial-gradient(120% 80% at 50% -10%, #2a2016 0%, var(--stout) 55%) fixed,
      var(--stout);
    color:var(--head);
    font-family:"Spectral",Georgia,serif;
    font-size:17px; line-height:1.5;
    -webkit-text-size-adjust:100%;
    padding-bottom:env(safe-area-inset-bottom);
  }
  h1,h2,h3{font-family:"Cinzel",serif;font-weight:600;letter-spacing:.04em;margin:0}
  .mono{font-family:"Space Mono",ui-monospace,monospace}
  button{font-family:inherit;cursor:pointer}
  input{font-family:inherit}
  a{color:var(--gold)}

  .wrap{max-width:760px;margin:0 auto;padding:18px 16px 64px}

  /* ---------- Header ---------- */
  header.top{text-align:center;padding:14px 0 10px}
  .suits{color:var(--gold-dim);letter-spacing:.5em;font-size:14px;margin-bottom:8px}
  .suits .r{color:var(--ruby)}
  .eyebrow{font-family:"Cinzel";font-size:11px;letter-spacing:.42em;color:var(--ash);text-transform:uppercase}
  header.top h1{font-size:clamp(30px,8vw,44px);color:var(--head);margin:4px 0 6px;text-shadow:0 1px 0 #000}
  .tagline{color:var(--ash);font-style:italic;font-size:15px}
  .rule{height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);margin:14px 0}

  /* ---------- Tabs ---------- */
  nav.tabs{display:flex;gap:6px;justify-content:center;margin:6px 0 18px;flex-wrap:wrap}
  nav.tabs button{
    background:transparent;border:1px solid var(--line);color:var(--ash);
    padding:8px 16px;border-radius:999px;font-size:13px;letter-spacing:.12em;
    text-transform:uppercase;font-family:"Cinzel";transition:.18s;
  }
  nav.tabs button[aria-selected="true"]{background:var(--gold);color:#241b13;border-color:var(--gold);font-weight:600}

  /* ---------- Panels ---------- */
  .panel{background:linear-gradient(180deg,var(--mid),var(--panel));border:1px solid var(--line);
    border-radius:var(--r);padding:18px;box-shadow:var(--shadow);margin-bottom:16px}
  .panel h2{font-size:17px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold)}
  .panel .sub{color:var(--ash);font-size:14px;margin-top:2px}

  label.fld{display:block;margin:14px 0 6px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--ash)}
  input[type=text],input[type=number],select{
    width:100%;background:#1b140d;border:1px solid var(--line);color:var(--head);
    border-radius:10px;padding:12px 14px;font-size:17px;outline:none;
  }
  input:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(199,154,59,.18)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
    background:var(--gold);color:#241b13;border:none;border-radius:11px;
    padding:14px 20px;font-size:15px;font-weight:700;letter-spacing:.06em;
    font-family:"Cinzel";text-transform:uppercase;width:100%;transition:.15s}
  .btn:hover{filter:brightness(1.06)}
  .btn:active{transform:translateY(1px)}
  .btn[disabled]{opacity:.4;cursor:not-allowed}
  .btn.ghost{background:transparent;color:var(--head);border:1px solid var(--line)}
  .btn.ruby{background:var(--ruby);color:var(--head)}
  .btn.sm{padding:9px 14px;font-size:12px;width:auto}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .row > *{flex:1}

  /* ---------- Player setup chips ---------- */
  .player-edit{display:flex;gap:8px;align-items:center;margin-bottom:8px;transition:background .15s}
  .player-edit.dragging{position:relative;z-index:5;background:rgba(199,154,59,.10);border-radius:10px;box-shadow:var(--shadow)}
  .player-edit .num{font-family:"Space Mono";color:var(--gold);width:22px;text-align:center}
  .player-edit button{flex:0 0 auto;background:transparent;border:1px solid var(--line);
    color:var(--ash);border-radius:10px;width:44px;height:46px;font-size:18px}
  .player-edit .draghandle{width:38px}
  .draghandle{cursor:grab;touch-action:none;user-select:none;font-size:16px}
  .draghandle:active{cursor:grabbing}
  .namebox{position:relative;flex:1;min-width:0}
  .suggest{position:absolute;left:0;right:0;top:calc(100% + 4px);z-index:30;
    background:#1b140d;border:1px solid var(--gold-dim);border-radius:10px;
    box-shadow:var(--shadow);max-height:200px;overflow-y:auto}
  .suggest[hidden]{display:none}
  .suggest button{display:block;width:100%;text-align:left;background:transparent;border:none;
    color:var(--head);padding:10px 14px;font-size:15px;font-family:"Spectral";border-bottom:1px solid var(--line)}
  .suggest button:last-child{border-bottom:none}
  .suggest button:hover,.suggest button:focus{background:rgba(199,154,59,.16);color:var(--gold)}

/* ---------- The Shelf: pint standings ---------- */

.shelf{
    display:flex;
    gap:14px;
    overflow-x:auto;
    padding:12px 12px 18px;
    border-bottom:2px solid var(--gold-dim);
    margin-bottom:6px;
    -webkit-overflow-scrolling:touch;
    background: linear-gradient(180deg, #7a5530 0%, #6b4826 60%, #5a3c1e 100%);
    border-radius:10px 10px 0 0;
    border-top: 1px solid rgba(199,154,59,.22);
    border-left: 1px solid rgba(199,154,59,.10);
    border-right: 1px solid rgba(199,154,59,.10);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.04), 0 4px 20px rgba(0,0,0,.5);
}

.pint{
    flex:0 0 auto;
    width:80px;
    text-align:center;
}

.glass{
    position:relative;
    width:93px;
    height:138px;
    margin:0 auto 8px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,.5));
}



.fill{
    position:absolute;
    left:0;
    right:0;
    bottom:0;

    height:0%;

    overflow:visible;

    background:
        radial-gradient(
            ellipse at 50% 0%,
            rgba(185,70,40,.20),
            transparent 60%
        ),
        linear-gradient(
            180deg,
            #352015,
            #1d0d08 45%,
            #060303
        );

    transition:
        height .8s cubic-bezier(.2,.8,.2,1);
}

.foam{
    position:absolute;

    left:2px;
    right:2px;

    top:-10px;

    height:15px;

    border-radius:50%;

    background:
        radial-gradient(
            ellipse at center,
            #fffef9,
            #f6edd5 70%,
            #e0cca2
        );

    opacity:0;

    transform:translateY(4px);

    transition:.25s;
}

.fill.full .foam{

    opacity:1;

    transform:none;
}


.pint.lead .glass{
    filter:
        drop-shadow(0 0 1px var(--gold))
        drop-shadow(0 0 12px rgba(199,154,59,.55));
}

.crown{
    color:var(--gold);
    font-size:12px;
    height:14px;
    line-height:14px;
}

  /* ---------- Round entry ---------- */
  .round-head{display:flex;align-items:baseline;justify-content:space-between;gap:8px;flex-wrap:wrap}
  .round-head .rno{font-family:"Cinzel";font-size:22px;color:var(--head)}
  .round-head .cards{font-family:"Space Mono";color:var(--gold);font-size:15px}
  .deal-note{font-size:13px;color:var(--ash);margin:6px 0 14px}
  .deal-note b{color:var(--head);font-weight:600}

  .entry{display:grid;grid-template-columns:1fr 64px 64px;gap:8px;align-items:center;margin-bottom:8px}
  .entry.bidphase{grid-template-columns:1fr 76px}
  .entry.playphase{grid-template-columns:1fr 54px 64px}
  .lockchip{font-family:"Space Mono";font-size:17px;text-align:center;color:var(--gold);
    background:rgba(199,154,59,.12);border:1px solid var(--line);border-radius:9px;padding:11px 0}
  .hint{font-family:"Space Mono";font-size:11px;color:#e7a39d;flex:0 0 auto}
  .phasetag{font-family:"Cinzel";font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold)}
  .entry.head{margin-bottom:6px}
  .entry.head span{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ash);text-align:center}
  .entry.head .pl{text-align:left}
  .entry .pl{display:flex;align-items:center;gap:8px;min-width:0;flex-wrap:wrap}
  .entry .pl .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .badge{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:6px;flex:0 0 auto}
  .badge.deal{background:var(--ruby);color:var(--head)}
  .badge.first{background:var(--gold);color:#241b13}
  .badge.made{background:rgba(122,154,78,.18);color:#b9cf8f;border:1px solid rgba(122,154,78,.4)}
  .badge.give{background:rgba(199,154,59,.16);color:var(--gold);border:1px solid rgba(199,154,59,.4);cursor:pointer}
  .entry input{padding:11px 6px;text-align:center;font-family:"Space Mono";font-size:18px}
  .entry input.bad{border-color:var(--ruby);box-shadow:0 0 0 3px rgba(163,45,39,.22)}
  .entry input.made{border-color:var(--gold)}

  /* ---------- Trumps picker (Whist) ---------- */
  .trumps{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:12px 0 2px}
  .trumps .lab{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--ash)}
  .trumps .lab b{color:var(--head);font-weight:600;text-transform:none;letter-spacing:0}
  .suitbtn{flex:0 0 auto;width:46px;height:46px;border-radius:11px;border:1px solid var(--line);
    background:#1b140d;color:var(--head);font-size:22px;line-height:1;display:inline-flex;align-items:center;justify-content:center;transition:.15s}
.suitbtn[data-suit="H"],.suitbtn[data-suit="D"]{color:var(--ruby)}
.suitbtn[data-suit="N"]{font-size:13px;font-family:"Cinzel";color:var(--ash)}
  .suitbtn[aria-pressed="true"]{border-color:var(--gold);box-shadow:0 0 0 2px rgba(199,154,59,.4);background:rgba(199,154,59,.12)}

  /* ---------- Drink hand-off picker (Twist) ----------
     Replaces a dropdown: once a contract is made, every OTHER
     player's row becomes a tappable target — tap their row to
     send them the drink. Their own input still works normally. */
  .give-prompt{margin:-2px 0 10px;padding:10px 12px;font-size:13.5px;color:var(--head);
    background:rgba(199,154,59,.10);border:1px solid rgba(199,154,59,.35);border-radius:9px}
  .give-prompt b{color:var(--gold)}
  .entry.playphase.pickable{cursor:pointer;border-radius:10px;transition:.15s}
  .entry.playphase.pickable:hover,.entry.playphase.pickable:active{background:rgba(199,154,59,.14)}
  .entry.playphase.pickable .pl .nm{color:var(--gold)}

  /* ---------- Round drinks recap (Twist) ---------- */
  .recap{margin:0 0 14px;padding:10px 14px;background:var(--mid);border:1px solid var(--line);
    border-radius:10px;font-size:13px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .recap .recap-lbl{font-family:"Cinzel";font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ash);flex:0 0 auto}
  .recap .recap-chip{font-family:"Space Mono";font-size:13px;color:var(--head);background:rgba(199,154,59,.10);
    border:1px solid var(--line);border-radius:8px;padding:3px 9px}
  .recap .recap-chip b{color:var(--gold)}
  .recap .recap-empty{color:var(--ash);font-style:italic}

  .feedback{margin:12px 0;font-size:14px;min-height:22px}
  .feedback .tag{display:inline-block;padding:3px 9px;border-radius:8px;margin-right:8px;font-family:"Space Mono";font-size:13px}
  .tag.warn{background:rgba(163,45,39,.18);color:#e7a39d;border:1px solid rgba(163,45,39,.4)}
  .tag.good{background:rgba(122,154,78,.16);color:#b9cf8f;border:1px solid rgba(122,154,78,.4)}
  .tag.info{background:rgba(199,154,59,.14);color:var(--gold);border:1px solid rgba(199,154,59,.35)}

  /* ---------- Scorepad (paper) ---------- */
  .pad{background:var(--paper);color:#2a2016;border-radius:var(--r);padding:14px;box-shadow:var(--shadow);overflow-x:auto}
  .pad h3{font-family:"Cinzel";font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:#6b4f1d;margin-bottom:10px}
  table{border-collapse:collapse;width:100%;font-size:14px}
  .pad th,.pad td{padding:7px 8px;text-align:center;border-bottom:1px solid rgba(42,32,22,.14)}
  .pad th{font-family:"Cinzel";font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#6b4f1d;font-weight:600}
  .pad td.rh{text-align:left;font-family:"Space Mono";color:#7a5b22;white-space:nowrap}
  .pad td.sc{font-family:"Space Mono"}
  .pad td .made{color:var(--gold-dim);font-weight:700}
  .pad tr.editable{cursor:pointer}
  .pad tr.editable:hover td{background:rgba(199,154,59,.14)}
  .pad tfoot td{font-family:"Space Mono";font-weight:700;font-size:15px;border-top:2px solid #2a2016;border-bottom:none;color:#241b13}
  .pad .editing{background:rgba(199,154,59,.22)}
  .pad .tap{font-size:11px;color:#8a6a2a;font-style:italic;margin-top:8px}

  /* ---------- Winner ---------- */
  .winner{text-align:center;padding:8px 0 4px}
  .winner .cup{font-size:40px}
  .winner h2{font-size:26px;color:var(--gold);margin:6px 0}
  .standings{list-style:none;padding:0;margin:14px 0;max-width:380px;margin-inline:auto}
  .standings li{display:flex;justify-content:space-between;padding:9px 14px;border:1px solid var(--line);
    border-radius:10px;margin-bottom:7px;font-size:15px}
  .standings li .pos{color:var(--ash);font-family:"Space Mono";margin-right:10px}
  .standings li.win{border-color:var(--gold);background:rgba(199,154,59,.1)}
  .standings li .pts{font-family:"Space Mono";color:var(--gold)}

  /* ---------- Stats ---------- */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:8px}
  .stat{background:var(--mid);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center}
  .stat .big{font-family:"Space Mono";font-size:26px;color:var(--gold)}
  .stat .lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ash);margin-top:4px}
  .hof li{display:grid;grid-template-columns:24px 1fr auto auto;gap:10px;align-items:center;
    list-style:none;padding:10px 6px;border-bottom:1px solid var(--line)}
  .hof{padding:0;margin:0}
  .hof .rk{font-family:"Space Mono";color:var(--gold)}
  .hof .nm{font-weight:600}
  .hof .meta{font-size:12px;color:var(--ash)}
  .hof .w{font-family:"Space Mono";color:var(--head)}
  .hof-row{transition:background .15s}
  .hof-row:hover{background:rgba(199,154,59,.08)}
  .hof-row .chev{color:var(--gold-dim);font-size:13px}
  .empty{color:var(--ash);text-align:center;font-style:italic;padding:24px 0}

  /* ---------- Stat graphs (hand-rolled SVG bar/line charts) ---------- */
  .chart-card{background:var(--mid);border:1px solid var(--line);border-radius:12px;padding:14px 14px 6px;margin:10px 0 16px}
  .chart-card .ctitle{font-family:"Cinzel";font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ash);margin-bottom:6px}
  .chart-card svg{display:block;width:100%}
  .trend-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px}
  .trend-row .lbl{font-family:"Cinzel";font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ash)}

  /* ---------- Player picker (select-to-view, replaces showing everyone) ---------- */
  .picker-hint{font-size:13px;color:var(--ash);margin:2px 0 10px}

  /* ---------- Compare players ---------- */
  .compare-toggle{display:flex;justify-content:flex-end;margin:-2px 0 4px}
  .chip-row{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 4px}
  .chip{font-family:"Space Mono";font-size:12.5px;padding:8px 14px;border-radius:999px;
    border:1px solid var(--line);background:#1b140d;color:var(--ash);transition:.15s}
  .chip[aria-pressed="true"]{background:var(--gold);color:#241b13;border-color:var(--gold);font-weight:700}
  .chip[disabled]{opacity:.35;cursor:not-allowed}
  .compare-empty{color:var(--ash);font-style:italic;font-size:13px;margin:10px 0}
  .compare-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:14px 0 6px}
  .compare-card{background:var(--mid);border:1px solid var(--line);border-radius:12px;padding:12px;border-top:3px solid var(--swatch,var(--gold))}
  .compare-card h4{font-family:"Cinzel";font-size:12.5px;color:var(--head);margin:0 0 8px;letter-spacing:.04em;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .compare-card .crow{display:flex;justify-content:space-between;gap:8px;font-size:12px;padding:4.5px 0;border-bottom:1px solid var(--line);color:var(--ash)}
  .compare-card .crow:last-child{border-bottom:none}
  .compare-card .crow b{color:var(--head);font-family:"Space Mono";font-weight:600}

  .seg{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 4px}
  .seg .segbtn{flex:0 0 auto}
  .seg .segbtn[aria-pressed="true"]{background:var(--gold);color:#241b13;border-color:var(--gold);font-weight:700}

  details.rules{margin-top:8px;border:1px solid var(--line);border-radius:12px;padding:0 14px;background:var(--mid)}
  details.rules summary{cursor:pointer;padding:14px 0;font-family:"Cinzel";font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold)}
  details.rules div{padding-bottom:14px;font-size:14px;color:var(--head)}
  details.rules b{color:var(--gold)}
  details.rules .src{color:var(--ash);font-style:italic}

  .foot{text-align:center;color:var(--ash);font-size:12px;margin-top:24px}
  .pill{display:inline-block;font-size:11px;border:1px solid var(--line);border-radius:999px;padding:3px 10px;color:var(--ash)}

  @media (max-width:420px){ .entry{grid-template-columns:1fr 56px 56px} .pint{width:66px} }
  @media (prefers-reduced-motion:reduce){ *{transition:none!important} .fill{transition:none} }
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="suits"><span class="r">&hearts;</span> &spades; <span class="r">&diams;</span> &clubs;</div>
    <div class="eyebrow">The Scorekeeper</div>
    <h1>Contract Whist</h1>
    <div class="tagline">Bids in. Pints poured. Twist optional.</div>
  </header>

  <nav class="tabs" id="tabs">
    <button data-view="whist" aria-selected="true">Whist</button>
    <button data-view="twist">Twist</button>
    <button data-view="stats">Hall of Fame</button>
  </nav>

  <main id="app"></main>

  <div class="foot">
    <span class="pill" id="storeBadge">Local table</span>
    &nbsp; A scorepad, not a dealer. Pour responsibly.
  </div>
</div>

<script>
/* ================================================================
   CONTRACT WHIST — SCOREKEEPER  (Whist + Twist, one app)
   Single-file, host-anywhere. No build step, no framework.

   TWO MODES, ONE TABLE:
   • Whist — the straight game. Bid, play, score. Trumps are tracked
     for stats (who hogs the lead suit, who makes it when they pick).
   • Twist — same bidding/scoring rules, plus a drinking layer:
       - Miss your contract → you're assigned drinks, 2 (configurable)
         per trick you're out by.
       - Make your contract → tap any OTHER player's row in that
         round's entry to hand them a drink (no dropdown — their row
         IS the picker; their own trick input still works as normal).
       - Winner and loser each down a pint when the game ends.
     Each recorded round shows a single combined "drinks this round"
     recap rather than mixing the miss-penalty and hand-off signals.

   HOUSE RULES (shared, configurable per game in Settings):
   • Rounds run inverse to cards: start at 7 cards → 7 rounds → down to 1.
   • Left of the dealer bids first; the dealer bids last.
   • Hook rule: the dealer may not make the bids total equal the tricks
     available (someone must be left over- or under-bid).
   • Last round (1 card): the hook is relaxed (bids may run up to one off).
   • Scoring: made your contract = 10 + tricks won. Missed it = tricks won.
   ================================================================ */

/* ---------------------------------------------------------------
   1. CONFIG + STORAGE ADAPTER  (the future-proof seam)
   ---------------------------------------------------------------
   Everything the app reads/writes goes through `Storage`, an async
   adapter keyed by game `mode` ("whist" | "twist"). Today it's
   pointed at Supabase, with EACH mode tracked in its OWN table —
   Whist's classic scores stay in `cw_games` (unchanged from before),
   and Twist's drink-tracking games live in a separate `cw_twist_games`
   table, so the two Hall of Fames never mix data.

   To go back to pure on-device storage, flip CONFIG.backend to
   'local' — the rest of the app does not change.

   ONE-TIME SETUP — run BOTH blocks below in the Supabase SQL editor.
   The first (cw_games) likely already exists from Whist. The second
   (cw_twist_games) is new and required for the Twist tab's Hall of
   Fame / drink stats to sync online — without it, Twist still works
   fully on-device, it just won't sync across devices.

      create table cw_games (
        id           uuid primary key,
        created_at   timestamptz not null default now(),
        finished_at  timestamptz,
        players      jsonb not null,   -- ["Player 1","Player 2",...]  (index = player slot)
        settings     jsonb not null,
        start_dealer int  not null,
        rounds       jsonb not null,   -- [{cards,dealerIndex,bids[],tricks[],trumps,recorded}]
        winner       text
      );
      alter table cw_games enable row level security;
      create policy "anon read"   on cw_games for select using (true);
      create policy "anon write"  on cw_games for insert with check (true);
      create policy "anon update" on cw_games for update using (true) with check (true);

      create table cw_twist_games (
        id           uuid primary key,
        created_at   timestamptz not null default now(),
        finished_at  timestamptz,
        players      jsonb not null,
        settings     jsonb not null,   -- includes missMult, makeCount
        start_dealer int  not null,
        rounds       jsonb not null,   -- [{cards,dealerIndex,bids[],tricks[],giveTo[],recorded}]
        winner       text
      );
      alter table cw_twist_games enable row level security;
      create policy "anon read"   on cw_twist_games for select using (true);
      create policy "anon write"  on cw_twist_games for insert with check (true);
      create policy "anon update" on cw_twist_games for update using (true) with check (true);

   Everything else (all-time stats, drink tallies) is computed
   client-side from the stored games, so the schema stays this simple.

      -- Shared player directory — a living roster of every name ever
      -- typed at this table, used purely to power the autocomplete in
      -- Setup (PlayerDirectory below). Independent of cw_games /
      -- cw_twist_games, and NOT mode-specific.
      create table cw_players (
        id uuid primary key default gen_random_uuid(),
        name text not null,
        normalized_name text generated always as (lower(trim(name))) stored,
        created_at timestamptz not null default now(),
        unique(normalized_name)
      );
      alter table cw_players enable row level security;
      create policy "anon read"  on cw_players for select using (true);
      create policy "anon write" on cw_players for insert with check (true);

// Per-mode storage keys / table names. Whist keeps the original,
// unsuffixed keys + table so existing data isn't orphaned.
function activeKey(mode){ return mode==="twist" ? "cw_active_twist" : "cw_active"; }
function gamesKey(mode){ return mode==="twist" ? "cw_games_twist" : "cw_games"; }
function tableName(mode){ return mode==="twist" ? "cw_twist_games" : "cw_games"; }

/* ---- Local adapter: localStorage with in-memory fallback ---- */
const mem = new Map();
const LS = {
  get(k){ try { return localStorage.getItem(k); } catch { return mem.get(k) ?? null; } },
  set(k,v){ try { localStorage.setItem(k,v); } catch { mem.set(k,v); } },
  del(k){ try { localStorage.removeItem(k); } catch { mem.delete(k); } }
};
const LocalAdapter = {
  async getActive(mode){
    const r = LS.get(activeKey(mode));
    try { return r ? JSON.parse(r) : null; }
    catch(e){ console.warn("Corrupt active store — clearing:", e); LS.del(activeKey(mode)); return null; }
  },
  async setActive(mode,g){ LS.set(activeKey(mode), JSON.stringify(g)); },
  async clearActive(mode){ LS.del(activeKey(mode)); },
  async getGames(mode){
    const r = LS.get(gamesKey(mode));
    let m = {};
    try { m = r ? JSON.parse(r) : {}; }
    catch(e){ console.warn("Corrupt games store — clearing:", e); LS.del(gamesKey(mode)); }
    return Object.values(m);
  },
  async saveGame(mode,g){ const r = LS.get(gamesKey(mode)); const m = r ? JSON.parse(r) : {}; m[g.id] = g; LS.set(gamesKey(mode), JSON.stringify(m)); },
  label(){ return "Local table"; }
};

/* ---- Supabase adapter (dependency-free REST) ---- */
const SupabaseAdapter = {
  _h(){
    const k = CONFIG.supabase.anonKey;
    return { apikey:k, Authorization:`Bearer ${k}`, "Content-Type":"application/json" };
  },
  _url(path){ return CONFIG.supabase.url.replace(/\/$/,"") + "/rest/v1/" + path; },
  // The in-progress game stays on the device (fast + works offline).
  async getActive(mode){ return LocalAdapter.getActive(mode); },
  async setActive(mode,g){ return LocalAdapter.setActive(mode,g); },
  async clearActive(mode){ return LocalAdapter.clearActive(mode); },
  async getGames(mode){
    const table = tableName(mode);
    try{
      const res = await fetch(this._url(`${table}?select=*&finished_at=not.is.null&order=finished_at.asc`), { headers:this._h() });
      if(!res.ok) throw new Error("HTTP "+res.status);
      const games = (await res.json()).map(row=>rowToGame(row,mode));
      try{ const m={}; games.forEach(g=>m[g.id]=g); LS.set(gamesKey(mode), JSON.stringify(m)); }catch{} // mirror for offline
      return games;
    }catch(e){ console.warn(`Supabase getGames(${mode}) failed — using local cache:`, e); return LocalAdapter.getGames(mode); }
  },
  async saveGame(mode,g){
    LocalAdapter.saveGame(mode,g); // local first, always — never lose a result
    const table = tableName(mode);
    try{
      const res = await fetch(this._url(`${table}?on_conflict=id`), {
        method:"POST",
        headers:{ ...this._h(), Prefer:"resolution=merge-duplicates,return=minimal" },
        body: JSON.stringify(gameToRow(g))
      });
      if(!res.ok) console.warn("Supabase saveGame HTTP", res.status, await res.text());
    }catch(e){ console.warn(`Supabase saveGame(${mode}) failed (kept locally):`, e); }
  },
  label(){ return "Supabase · online"; }
};
function gameToRow(g){ return { id:g.id, created_at:g.createdAt, finished_at:g.finishedAt,
  players:g.players, settings:g.settings, start_dealer:g.startDealer, rounds:g.rounds, winner:g.winner||null }; }
function rowToGame(r,mode){ return { id:r.id, mode, createdAt:r.created_at, finishedAt:r.finished_at,
  players:r.players, settings:r.settings, startDealer:r.start_dealer, rounds:r.rounds, winner:r.winner }; }

const Storage = CONFIG.backend === "supabase" ? SupabaseAdapter : LocalAdapter;

/* ---- Player directory adapter (shared roster, mode-independent) ----
   Backs the name-suggest dropdown in Setup. Lives in its own table
   (cw_players) so it's never tangled with game data. Falls back to
   silence (not an error) if the table doesn't exist yet — the app
   still works fine deriving suggestions from past games only. */
const PLAYERS_CACHE_KEY = "cw_players_cache";
const PlayerDirectory = {
  async list(){
    if(CONFIG.backend !== "supabase") return null;
    try{
      const res = await fetch(SupabaseAdapter._url("cw_players?select=name&order=name.asc"), { headers:SupabaseAdapter._h() });
      if(!res.ok) throw new Error("HTTP "+res.status);
      const names = (await res.json()).map(r=>r.name);
      try{ LS.set(PLAYERS_CACHE_KEY, JSON.stringify(names)); }catch{}
      return names;
    }catch(e){
      console.warn("PlayerDirectory.list failed — using cache:", e);
      try{ const c = LS.get(PLAYERS_CACHE_KEY); return c ? JSON.parse(c) : null; }catch{ return null; }
    }
  },
  // Fire-and-forget upsert; ignores rows that already exist (unique on
  // normalized_name). Never blocks the UI and never throws upward.
  async upsert(names){
    if(CONFIG.backend !== "supabase") return;
    const rows = [...new Set((names||[]).map(n=>(n||"").trim()).filter(Boolean))].map(n=>({name:n}));
    if(!rows.length) return;
    try{
      const res = await fetch(SupabaseAdapter._url("cw_players?on_conflict=normalized_name"), {
        method:"POST",
        headers:{ ...SupabaseAdapter._h(), Prefer:"resolution=ignore-duplicates,return=minimal" },
        body: JSON.stringify(rows)
      });
      if(!res.ok) console.warn("PlayerDirectory.upsert HTTP", res.status, await res.text());
    }catch(e){ console.warn("PlayerDirectory.upsert failed:", e); }
  }
};

// Auto-advance focus to the next entry field once the current value is
// unambiguous (no further digit could keep it <= max). Falls through to the
// action button on the last field so Enter/tap submits.
function focusAdvance(inputs, current, max, actionSel){
  const v = current.value;
  if(v==="") return;
  const n = parseInt(v,10);
  if(isNaN(n)) return;
  const complete = (n===0) || (n*10 > max);   // e.g. max 7 → any digit done; max 13 → "1" waits for a 2nd digit
  if(!complete) return;
  const i = inputs.indexOf(current);
  if(i>=0 && i < inputs.length-1){
    const nx = inputs[i+1]; nx.focus(); nx.select && nx.select();
  } else {
    const btn = actionSel && $(actionSel);
    if(btn && !btn.disabled) btn.focus();
  }
}

/* ---------------------------------------------------------------
   3. GAME LOGIC  (shared by both modes)
   --------------------------------------------------------------- */
function newGame(players, startDealer, settings, mode){
  const n = players.length;
  const rounds = [];
  for(let c = settings.startCards; c >= 1; c--){
    const r = settings.startCards - c;             // 0-based round index
    rounds.push({
      cards:c,
      dealerIndex:(startDealer + r) % n,
      bids:Array(n).fill(null),
      tricks:Array(n).fill(null),
      trumps:null,              // Whist: suit code chosen by the highest bidder
      giveTo:Array(n).fill(null), // Twist: giveTo[giver] = recipient index
      bidsLocked:false,
      recorded:false
    });
  }
  return { id:uid(), mode, createdAt:new Date().toISOString(), finishedAt:null,
    players:players.slice(), settings:{...settings}, startDealer, rounds, winner:null };
}
// Bid order for a round: left of dealer first … dealer last.
function bidOrder(round, n){
  const o=[]; for(let i=1;i<=n;i++) o.push((round.dealerIndex + i) % n); return o;
}
// Highest bidder picks trumps. Ties break to whoever reached that bid first in bid order.
function highestBidder(g, r){
  const order = bidOrder(r, g.players.length);
  let best=-Infinity, who=null;
  for(const pi of order){ const b=r.bids[pi]; if(b!=null && b>best){ best=b; who=pi; } }
  return who;
}
function roundScore(bid, tricks, st){
  if(bid==null || tricks==null) return 0;
  if(bid === tricks) return st.bonus + (st.addTricks ? tricks : 0);
  return st.failTricks ? tricks : 0;
}
function totals(g){
  const t = Array(g.players.length).fill(0);
  g.rounds.forEach(r=>{ if(r.recorded) r.bids.forEach((_,i)=> t[i]+=roundScore(r.bids[i], r.tricks[i], g.settings)); });
  return t;
}
function currentRoundIndex(g){ return g.rounds.findIndex(r=>!r.recorded); }
function leaders(g){
  const t = totals(g); const max = Math.max(...t);
  return { totals:t, max, winners:t.map((v,i)=>v===max?i:-1).filter(i=>i>=0) };
}
function losers(g){
  const t = totals(g); const min = Math.min(...t);
  return { totals:t, min, losers:t.map((v,i)=>v===min?i:-1).filter(i=>i>=0) };
}

/* ---- Twist-only: drinks ----
   Drinks for a SINGLE round: 2 (settings.missMult) per trick missed by,
   plus 1 (settings.makeCount) for every contract-made hand-off in that
   round. A stale/invalid giveTo (e.g. the giver later un-makes their
   contract by editing tricks) is ignored — only counts if bid===tricks
   for that giver right now. */
function roundDrinks(r, settings){
  const n = r.bids.length;
  const d = Array(n).fill(0);
  const missMult = settings.missMult ?? 2;
  const makeCount = settings.makeCount ?? 1;
  r.bids.forEach((b,i)=>{
    const tr = r.tricks[i];
    if(b!=null && tr!=null && b!==tr) d[i] += Math.abs(b-tr)*missMult;
  });
  (r.giveTo||[]).forEach((target,i)=>{
    if(target!=null && r.bids[i]!=null && r.tricks[i]!=null && r.bids[i]===r.tricks[i]){
      d[target] += makeCount;
    }
  });
  return d;
}
// Drinks owed per player across the whole game so far, plus the final
// winner's/loser's pint once the game is finished.
function drinkTotals(g){
  const n = g.players.length;
  const d = Array(n).fill(0);
  g.rounds.forEach(r=>{
    if(!r.recorded) return;
    roundDrinks(r, g.settings).forEach((v,i)=> d[i]+=v);
  });
  if(g.finishedAt){
    leaders(g).winners.forEach(i=> d[i] += 1);
    losers(g).losers.forEach(i=> d[i] += 1);
  }
  return d;
}

// All player names that have ever played (trimmed, de-duped case-insensitively,
// pooled across the shared cw_players directory + both Whist and Twist games
// + whichever game is in progress).
function allKnownNames(){
  const seen = new Map();
  const add = nm => { const t=(nm||"").trim(); if(!t) return; const k=t.toLowerCase(); if(!seen.has(k)) seen.set(k,t); };
  (state.knownPlayerNames||[]).forEach(add);

    (state.games[mode]||[]).forEach(g=> g.players.forEach(add));
    if(state.active && state.active[mode]) state.active[mode].players.forEach(add);
  });
  return [...seen.values()].sort((a,b)=>a.localeCompare(b));
}

    handle.onpointerdown = e=>{
      e.preventDefault();
      const row = handle.closest('.player-edit');
      const startY = e.clientY, startTop = row.offsetTop;
      row.classList.add('dragging');
      try{ handle.setPointerCapture(e.pointerId); }catch{}

      function move(ev){
        const desiredTop = startTop + (ev.clientY - startY);
        const rows = $$('.player-edit', list);
        const idx = rows.indexOf(row);
        const prev = rows[idx-1], next = rows[idx+1];
        if(prev && desiredTop < prev.offsetTop + prev.offsetHeight/2) list.insertBefore(row, prev);
        else if(next && desiredTop + row.offsetHeight > next.offsetTop + next.offsetHeight/2) list.insertBefore(next, row);
        row.style.transform = `translateY(${desiredTop - row.offsetTop}px)`;
      }
      function up(){
        document.removeEventListener('pointermove', move);
        document.removeEventListener('pointerup', up);
        row.classList.remove('dragging');
        row.style.transform = '';
        state.setupPlayers[mode] = $$('.nameinput', list).map(inp=>inp.value);
        render(); wireSetup(mode);
      }
      document.addEventListener('pointermove', move);
      document.addEventListener('pointerup', up);
    };
  });
}
function refreshDealerOpts(mode){
  const sel = $("#dealer"); if(!sel) return; const cur = sel.value;
  sel.innerHTML = state.setupPlayers[mode].map((nm,i)=>`<option value="${i}">${esc(nm||EXAMPLE_NAMES[i]||("Player "+(i+1)))}</option>`).join("");
  sel.value = Math.min(cur, state.setupPlayers[mode].length-1);
}
function updateRoundsHint(mode){
  const sc = clampInt($("#startCards").value,1,13) || 1;
  const n = state.setupPlayers[mode].length;
  const cap = Math.min(13, Math.floor(52/Math.max(2,n)));
  if(sc>cap){ $("#startCards").value = cap; }
  const v = clampInt($("#startCards").value,1,13)||1;
  $("#roundsHint").textContent = `${v} rounds · ${v} → 1 cards · ${n} players`;
}
function startGame(mode){
  const names = state.setupPlayers[mode].map((s,i)=> (s.trim()|| EXAMPLE_NAMES[i] || ("Player "+(i+1))));
  if(names.length<2) return;
  const settings = {
    startCards: clampInt($("#startCards").value,1,13)||7,
    bonus: clampInt($("#s_bonus").value,0,50) ?? 10,
    addTricks: $("#s_addTricks").checked,
    failTricks: $("#s_failTricks").checked,
    hook: $("#s_hook").checked,
    relaxLast: $("#s_relax").checked
  };
  if(mode==="twist"){
    settings.missMult = clampInt($("#s_missMult").value,0,10) ?? 2;
    settings.makeCount = clampInt($("#s_makeCount").value,0,10) ?? 1;
  }
  const dealer = parseInt($("#dealer").value,10)||0;
  const g = newGame(names, dealer, settings, mode);
  state.active[mode] = g;
  Storage.setActive(mode, g);
  // Grow the shared roster — locally right away (snappy autocomplete),
  // and persist to cw_players in the background (best-effort, never blocks).
  names.forEach(n=>{ if(!state.knownPlayerNames.includes(n)) state.knownPlayerNames.push(n); });
  PlayerDirectory.upsert(names);
  render();
}

/* ---------------- GAME ---------------- */
function viewGame(mode){
  const g = state.active[mode];
  const t = totals(g);
  const ci = currentRoundIndex(g);
  const done = ci === -1;
  const ld = leaders(g);
  const dr = mode==="twist" ? drinkTotals(g) : null;

  return `
    ${shelf(g,t,ld,dr,mode,done)}
    ${done && state.editing===null ? winnerPanel(g,ld,t,mode) : entryPanel(g,mode)}
    ${scorepad(g,t,mode)}
    <div class="row" style="margin-top:14px">
      <button class="btn ghost sm" id="abandon">Abandon game</button>
    </div>`;
}

function shelf(g,t,ld,dr,mode,done){
  const max = Math.max(1, ld.max);
  const min = Math.min(0, ...t);
  const range = Math.max(1, max - Math.min(0,min));
  // Pull live active streaks from finished games
  const fin = (state.games[mode]||[]).filter(x=>x.finishedAt);
  const chron = [...fin].sort((a,b)=>new Date(a.finishedAt)-new Date(b.finishedAt));
  const liveStreak = {};
  chron.forEach(x=>{
    const ld2=leaders(x); const ws=new Set(ld2.winners.map(i=>x.players[i]));
    x.players.forEach(nm=>{ liveStreak[nm] = ws.has(nm) ? ((liveStreak[nm]||0)>0?liveStreak[nm]+1:1) : ((liveStreak[nm]||0)<0?liveStreak[nm]-1:-1); });
  });

  const pints = g.players.map((nm,i)=>{
    const pct = Math.max(0, Math.round(((t[i]-Math.min(0,min))/range)*100));
    const lead = ld.winners.includes(i) && ld.max>0;
    const sk = liveStreak[nm]||0;
    const skTxt = sk>=2?`🔥${sk}`:sk<=-2?`❄${Math.abs(sk)}`:'';
    return `<div class="pint ${lead?'lead':''}">
      <div class="crown">${lead?'&#9819;':''}</div>
      <div class="glass">
    <svg viewBox="0 0 62 144" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block;transform:scaleX(1.35);transform-origin:center top;">
      <defs>
        <linearGradient id="sg${i}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#352015"/>
          <stop offset="45%" stop-color="#1d0d08"/>
          <stop offset="100%" stop-color="#060303"/>
        </linearGradient>
        <linearGradient id="fg${i}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#fffef9"/>
          <stop offset="70%" stop-color="#f6edd5"/>
          <stop offset="100%" stop-color="#e0cca2"/>
        </linearGradient>
        <linearGradient id="sh${i}" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
          <stop offset="18%" stop-color="rgba(255,255,255,0.04)"/>
          <stop offset="75%" stop-color="rgba(255,255,255,0.02)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0.10)"/>
        </linearGradient>
        <clipPath id="gc${i}">
  <path d="M6,8 Q31,4 56,8 C57,12 58,20 57,28 C56,42 52,57 49,74 C47,85 46,94 46,102 C46,114 48,124 51,130 C52,133 53,135 53,136 C53,138 51,140 49,140 L13,140 C11,140 9,138 9,136 C9,135 10,133 11,130 C14,124 16,114 16,102 C16,94 15,85 13,74 C10,57 6,42 5,28 C4,20 5,12 6,8 Z"/>
</clipPath>
<clipPath id="fc${i}">
  <rect x="${6+Math.round((1-(pct/100))*8)}" y="0" width="${50-Math.round((1-(pct/100))*16)}" height="144"/>
</clipPath>
        </clipPath>
      </defs>
      <rect x="0" y="${136-(pct/100)*130}" width="62" height="${(pct/100)*130}" fill="url(#sg${i})" clip-path="url(#gc${i})"/>
      ${pct>5?`<rect x="${6+Math.round((1-(pct/100))*8)}" y="${136-(pct/100)*130-Math.round(2+(pct/100)*(pct/100)*22)}" width="${50-Math.round((1-(pct/100))*16)}" height="${Math.round(2+(pct/100)*(pct/100)*22)}" rx="4" fill="#f0e6c8" clip-path="url(#fc${i})"/>`:''}
      <path d="M6,8 Q31,4 56,8 C57,12 58,20 57,28 C56,42 52,57 49,74 C47,85 46,94 46,102 C46,114 48,124 51,130 C52,133 53,135 53,136 C53,138 51,140 49,140 L13,140 C11,140 9,138 9,136 C9,135 10,133 11,130 C14,124 16,114 16,102 C16,94 15,85 13,74 C10,57 6,42 5,28 C4,20 5,12 6,8 Z" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.3"/>
      <line x1="7" y1="7" x2="55" y2="7" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M6,8 Q31,4 56,8 C57,12 58,20 57,28 C56,42 52,57 49,74 C47,85 46,94 46,102 C46,114 48,124 51,130 C52,133 53,135 53,136 C53,138 51,140 49,140 L13,140 C11,140 9,138 9,136 C9,135 10,133 11,130 C14,124 16,114 16,102 C16,94 15,85 13,74 C10,57 6,42 5,28 C4,20 5,12 6,8 Z" fill="url(#sh${i})" pointer-events="none"/>

</div>

      ${mode==="twist" ? `<div class="drinks">${dr[i]>0?`&#127866; ${dr[i]}`:''}</div>` : ''}
