// Single combined "drinks this round" recap — replaces mixing the
// miss-penalty and hand-off signals together.
function roundRecapHTML(g, ri){
  const r = g.rounds[ri];
  const d = roundDrinks(r, g.settings);
  const parts = g.players.map((nm,i)=> d[i]>0 ? `<span class="recap-chip">${esc(nm)} <b>+${d[i]}</b></span>` : '').filter(Boolean);
  const body = parts.length ? parts.join(' ') : `<span class="recap-empty">— a dry hand, nobody drinks.</span>`;
  return `<div class="recap"><span class="recap-lbl">Round ${ri+1} drinks</span>${body}</div>`;
}

function entryPanel(g, mode){
  const idx = state.editing!==null ? state.editing : currentRoundIndex(g);
  const r = g.rounds[idx];
  const n = g.players.length;
  const order = bidOrder(r, n);
  const isLast = idx === g.rounds.length-1;
  const firstBidder = order[0];
  const phase = r.bidsLocked ? "play" : "bid";

  // --- Phase 1: bidding (dealer hooked) — identical for both modes ---
  const rowsBid = order.map(pi=>{
    const isDealer = pi===r.dealerIndex, isFirst = pi===firstBidder;
    return `<div class="entry bidphase" data-row="${pi}">
      <div class="pl">
        <span class="nm">${esc(g.players[pi])}</span>
        ${isDealer?'<span class="badge deal">Dealer</span>':''}
        ${isFirst?'<span class="badge first">Bids 1st</span>':''}
        ${isDealer?'<span class="hint" data-hint></span>':''}
      </div>
      <input class="bid" inputmode="numeric" type="number" min="0" max="${r.cards}" data-bid="${pi}" value="${r.bids[pi]??''}" placeholder="–"/>
    </div>`;
  }).join("");

  const bidBody = `
    <div class="entry bidphase head"><span class="pl">Player</span><span>Bid</span></div>
    ${rowsBid}
    <div class="feedback" id="fb"></div>
    <button class="btn" id="lock">Lock bids &rarr;</button>`;

  let playBody;
  if(mode==="whist"){
    // --- Phase 2 (Whist): recording tricks + trumps, bids locked ---
    const rowsPlay = order.map(pi=>{
      const isDealer = pi===r.dealerIndex;
      return `<div class="entry playphase" data-row="${pi}">
        <div class="pl"><span class="nm">${esc(g.players[pi])}</span>${isDealer?'<span class="badge deal">Dealer</span>':''}</div>
        <div class="lockchip" title="bid">${r.bids[pi]??0}</div>
        <input class="trk" inputmode="numeric" type="number" min="0" max="${r.cards}" data-trk="${pi}" value="${r.tricks[pi]??''}" placeholder="–"/>
      </div>`;
    }).join("");

    const hb = highestBidder(g, r);
    const trumpsPicker = `
      <div class="trumps">
        <span class="lab">Trumps${hb!=null?` · <b>${esc(g.players[hb])}</b> picks`:''}</span>
        ${SUITS.map(([code,sym])=>`<button type="button" class="suitbtn" data-suit="${code}" aria-pressed="${r.trumps===code}">${sym}</button>`).join("")}
      </div>`;

    playBody = `
      <div class="entry playphase head"><span class="pl">Player</span><span>Bid</span><span>Won</span></div>
      ${rowsPlay}
      ${trumpsPicker}
      <div class="feedback" id="fb"></div>
      <button class="btn" id="record">${state.editing!==null?'Save round':'Record round'}</button>
      <button class="btn ghost sm" id="editbids" style="margin-top:10px">&larr; Edit bids</button>`;
  } else {
    // --- Phase 2 (Twist): recording tricks + click-to-assign drinks ---
    const tr = r.tricks, gv = r.giveTo || Array(n).fill(null);
    const madeNow = order.filter(pi=> tr[pi]!=null && tr[pi]===r.bids[pi]);
    const pending = madeNow.filter(pi=> gv[pi]==null);
    const activeGiver = pending.length ? pending[0] : null;

    const rowsPlay = order.map(pi=>{
      const isDealer = pi===r.dealerIndex;
      const made = tr[pi]!=null && tr[pi]===r.bids[pi];
      let tag = '';
      if(made && gv[pi]!=null) tag = `<span class="badge give" data-undo="1">&rarr; ${esc(g.players[gv[pi]])} &#127866;</span>`;
      else if(made && activeGiver===pi) tag = `<span class="badge made">Made &#127866;</span>`;
      const isPickable = activeGiver!=null && pi!==activeGiver;
      return `<div class="entry playphase${isPickable?' pickable':''}" data-row="${pi}">
        <div class="pl"><span class="nm">${esc(g.players[pi])}</span>${isDealer?'<span class="badge deal">Dealer</span>':''}<span data-tag>${tag}</span></div>
        <div class="lockchip" title="bid">${r.bids[pi]??0}</div>
        <input class="trk" inputmode="numeric" type="number" min="0" max="${r.cards}" data-trk="${pi}" value="${r.tricks[pi]??''}" placeholder="–"/>
      </div>`;
    }).join("");

    const givePrompt = `<div class="give-prompt" id="givePrompt" style="display:${activeGiver!=null?'':'none'}">${
      activeGiver!=null ? `&#127866; <b>${esc(g.players[activeGiver])}</b> made it — tap who gets the drink` : ''
    }</div>`;

    playBody = `
      <div class="entry playphase head"><span class="pl">Player</span><span>Bid</span><span>Won</span></div>
      ${rowsPlay}
      ${givePrompt}
      <div class="feedback" id="fb"></div>
      <button class="btn" id="record">${state.editing!==null?'Save round':'Record round'}</button>
      <button class="btn ghost sm" id="editbids" style="margin-top:10px">&larr; Edit bids</button>`;
  }

  // End-of-round recap for the round just played (Twist only) — a single
  // straightforward "who drinks how much" line, shown above the next round.
  const recap = (mode==="twist" && state.editing===null && idx>0 && g.rounds[idx-1].recorded)
    ? roundRecapHTML(g, idx-1) : '';

  return `${recap}<section class="panel" id="entry" data-idx="${idx}" data-phase="${phase}" data-mode="${mode}">
    <div class="round-head">
      <div class="rno">Round ${idx+1}<span style="color:var(--ash);font-size:14px"> / ${g.rounds.length}</span></div>
      <div class="cards">${r.cards} card${r.cards>1?'s':''} · ${r.cards} trick${r.cards>1?'s':''}</div>
    </div>
    <div class="deal-note"><b>${esc(g.players[r.dealerIndex])}</b> deals · <b>${esc(g.players[firstBidder])}</b> bids first · <span class="phasetag">${phase==="bid"?"Bidding":"Recording tricks"}</span>${isLast?'<span style="color:var(--gold)"> · final hand, hook relaxed</span>':''}</div>

    ${phase==="bid" ? bidBody : playBody}
    ${state.editing!==null?'<button class="btn ghost sm" id="cancelEdit" style="margin-top:10px">Cancel edit</button>':''}
  </section>`;
}

function scorepad(g,t,mode){
  const n = g.players.length;
  const head = `<tr><th>Rnd</th>${g.players.map(p=>`<th>${esc(p)}</th>`).join("")}</tr>`;
  const body = g.rounds.map((r,ri)=>{
    if(!r.recorded && ri!==state.editing) return ""; // only show played (or being-edited) rounds
    const rd = mode==="twist" && r.recorded ? roundDrinks(r, g.settings) : null;
    const cells = g.players.map((_,pi)=>{
      const made = r.bids[pi]!=null && r.bids[pi]===r.tricks[pi];
      const sc = roundScore(r.bids[pi], r.tricks[pi], g.settings);
      const bidTxt = r.bids[pi]==null?'·':r.bids[pi];
      const note = (rd && rd[pi]>0) ? `<br><small style="color:#e7a39d">&#127866; +${rd[pi]}</small>` : '';
      return `<td class="sc"><span class="${made?'made':''}">${sc}</span><br><small style="color:#9a7b3a">bid ${bidTxt}/${r.tricks[pi]??'·'}</small>${note}</td>`;
    }).join("");
    const cls = ri===state.editing?'editing':'';
    return `<tr class="editable ${cls}" data-edit="${ri}"><td class="rh">${r.cards}c</td>${cells}</tr>`;
  }).join("");
  const foot = `<tr>${[''].concat(t).map((v,i)=> i===0?`<td>Total</td>`:`<td>${v}</td>`).join("")}</tr>`;
  return `<div class="pad">
    <h3>Scorepad</h3>
    <table><thead>${head}</thead><tbody>${body||`<tr><td colspan="${n+1}" class="rh" style="color:#9a7b3a;text-align:center">No hands played yet</td></tr>`}</tbody><tfoot>${foot}</tfoot></table>
    <div class="tap">Tap any played hand to fix a mis-score.</div>
  </div>`;
}

function winnerPanel(g, ld, t, mode){
  const order = g.players.map((nm,i)=>({nm,i,pts:t[i]})).sort((a,b)=>b.pts-a.pts);
  const champs = ld.winners.map(i=>g.players[i]).join(" & ");

  let dr=null, downers='';
  if(mode==="twist"){
    dr = drinkTotals(g);
    const lo = losers(g);
    downers = [...new Set([...ld.winners, ...lo.losers])].map(i=>g.players[i]).join(" & ");
  }

  const li = order.map((row,pos)=>{
    const win = ld.winners.includes(row.i);
    const drinkTxt = (mode==="twist" && dr[row.i]) ? ` &middot; &#127866;${dr[row.i]}` : '';
    return `<li class="${win?'win':''}"><span><span class="pos">${pos+1}</span>${esc(row.nm)}</span><span class="pts">${row.pts}${drinkTxt}</span></li>`;
  }).join("");

  const recap = mode==="twist" ? roundRecapHTML(g, g.rounds.length-1) : '';

  return `${recap}<section class="panel">
    <div class="winner">
      <div class="cup">&#127881;</div>
      <h2>${esc(champs)}</h2>
      <div class="sub">${ld.winners.length>1?'A shared pot — split the next round.':'Winner takes the pot.'}</div>
      ${mode==="twist" ? `<div class="sub" style="color:var(--gold);margin-top:6px">&#127866; ${esc(downers)} — down your pint!</div>` : ''}
    </div>
    <ul class="standings">${li}</ul>
    <div class="row">
      <button class="btn" id="rematch">Rematch (same table)</button>
      <button class="btn ghost" id="newgame">New game</button>
    </div>
  </section>`;
}

/* ---------------- GAME WIRING ---------------- */
function wireGame(mode){
  // scorepad row editing
  $$('#app tr[data-edit]').forEach(tr=> tr.onclick = ()=>{ state.editing = +tr.dataset.edit; render(); });

  $("#abandon") && ($("#abandon").onclick = ()=>{
    if(confirm("Abandon this game? It won't be saved to the Hall of Fame.")){
      Storage.clearActive(mode); state.active[mode]=null; state.editing=null; render();
    }
  });
  $("#rematch") && ($("#rematch").onclick = ()=>{
    const g=state.active[mode]; const next=newGame(g.players,(g.startDealer+1)%g.players.length,g.settings,mode);
    state.active[mode]=next; Storage.setActive(mode,next); state.editing=null; render();
  });
  $("#newgame") && ($("#newgame").onclick = ()=>{
    state.setupPlayers[mode] = state.active[mode].players.slice();
    Storage.clearActive(mode); state.active[mode]=null; state.editing=null; render();
  });
  $("#cancelEdit") && ($("#cancelEdit").onclick = ()=>{ state.editing=null; render(); });

  if($("#entry")) wireEntry(mode);
}

function wireEntry(mode){
  const panel = $("#entry"); if(!panel) return;
  const g = state.active[mode];
  const idx = +panel.dataset.idx;
  const r = g.rounds[idx];
  const phase = panel.dataset.phase;
  const isLast = idx === g.rounds.length-1;
  const relaxed = isLast && g.settings.relaxLast;
  const n = g.players.length;
  const order = bidOrder(r, n);

  if(phase === "bid"){
    const readBids = ()=>{ const b=r.bids.slice();
      $$('#entry input.bid').forEach(inp=>{ const pi=+inp.dataset.bid; b[pi]= inp.value===''? null : clampInt(inp.value,0,r.cards); });
      return b; };

    const update = ()=>{
      const bids = readBids();
      const allBids = bids.every(x=>x!=null);
      const sumB = bids.reduce((a,x)=>a+(x||0),0);
      const hookViol = g.settings.hook && !relaxed && allBids && sumB===r.cards;

      // What single value would the dealer be forbidden from? (once everyone else is in)
      let forbidden = null;
      if(g.settings.hook && !relaxed){
        const others = bids.filter((_,i)=> i!==r.dealerIndex);
        if(others.every(x=>x!=null)){
          const f = r.cards - others.reduce((a,x)=>a+(x||0),0);
          if(f>=0 && f<=r.cards) forbidden = f;
        }
      }
      const hintEl = $('#entry [data-hint]');
      if(hintEl) hintEl.textContent = forbidden!=null ? `can't bid ${forbidden}` : '';

      $$('#entry input.bid').forEach(inp=>{ const pi=+inp.dataset.bid;
        inp.classList.toggle('bad', hookViol && pi===r.dealerIndex); });

      const tags = [`<span class="tag ${hookViol?'warn':'info'}">bids ${sumB}${allBids?'':' …'} / ${r.cards}</span>`];
      if(forbidden!=null) tags.push(`<span class="tag warn">dealer can't make it total ${r.cards} — no bid ${forbidden}</span>`);
      else if(!allBids) tags.push(`<span class="tag info">each player bids, dealer last</span>`);
      $('#fb').innerHTML = tags.join('');
      $('#lock').disabled = !allBids || hookViol;
    };

    $$('#entry input.bid').forEach(inp=>{
      inp.addEventListener('input', ()=>{ update(); focusAdvance($$('#entry input.bid'), inp, r.cards, '#lock'); });
      inp.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); focusAdvance($$('#entry input.bid'), inp, r.cards, '#lock'); } });
      inp.addEventListener('change', ()=>{ r.bids = readBids(); Storage.setActive(mode,g); });
    });
    update();

    $('#lock').onclick = ()=>{
      const bids = readBids();
      if(bids.some(x=>x==null)) return;
      const sumB = bids.reduce((a,x)=>a+(x||0),0);
      if(g.settings.hook && !relaxed && sumB===r.cards){
        $('#fb').innerHTML = `<span class="tag warn">Bids can't total ${r.cards}. The dealer must change.</span>`; return;
      }
      r.bids = bids; r.bidsLocked = true; Storage.setActive(mode,g); render();
    };

  } else if(mode==="whist"){ // ---- Whist play phase ----
    const readTr = ()=>{ const t=r.tricks.slice();
      $$('#entry input.trk').forEach(inp=>{ const pi=+inp.dataset.trk; t[pi]= inp.value===''? null : clampInt(inp.value,0,r.cards); });
      return t; };

    const update = ()=>{
      const tr = readTr();
      const allT = tr.every(x=>x!=null);
      const sumT = tr.reduce((a,x)=>a+(x||0),0);
      const trOk = allT && sumT===r.cards;
      $$('#entry .entry.playphase').forEach(row=>{ const pi=+row.dataset.row; const ti=row.querySelector('.trk'); if(!ti) return;
        const made = tr[pi]!=null && tr[pi]===r.bids[pi];
        ti.classList.toggle('made', made);
        ti.classList.toggle('bad', allT && sumT!==r.cards);
      });
      const rem = r.cards - sumT;
      const tags = [`<span class="tag ${trOk?'good':(allT?'warn':'info')}">tricks ${sumT} / ${r.cards}</span>`];
      if(allT && sumT!==r.cards) tags.push(`<span class="tag warn">must total ${r.cards} (${rem>0?rem+' short':Math.abs(rem)+' over'})</span>`);
      else if(!allT) tags.push(`<span class="tag info">enter tricks won by each</span>`);
      $('#fb').innerHTML = tags.join('');
      $('#record').disabled = !trOk;
    };

    $$('#entry input.trk').forEach(inp=>{
      inp.addEventListener('input', ()=>{ update(); focusAdvance($$('#entry input.trk'), inp, r.cards, '#record'); });
      inp.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); focusAdvance($$('#entry input.trk'), inp, r.cards, '#record'); } });
      inp.addEventListener('change', ()=>{ r.tricks = readTr(); Storage.setActive(mode,g); });
    });
    update();

    // Trumps picker (optional) — toggles the suit the highest bidder chose.
    $$('#entry .suitbtn').forEach(btn=>{
      btn.onclick = ()=>{
        const code = btn.dataset.suit;
        r.trumps = (r.trumps===code) ? null : code;
        $$('#entry .suitbtn').forEach(b=> b.setAttribute('aria-pressed', b.dataset.suit===r.trumps));
        Storage.setActive(mode,g);
      };
    });

    $('#record').onclick = ()=>{
      const tr = readTr();
      if(tr.some(x=>x==null) || tr.reduce((a,x)=>a+(x||0),0)!==r.cards){
        $('#fb').innerHTML = `<span class="tag warn">Tricks must total exactly ${r.cards}.</span>`; return;
      }
      r.tricks = tr; r.recorded = true; r.bidsLocked = true;
      state.editing = null; finishIfDone(g,mode); Storage.setActive(mode,g); render();
    };
    $('#editbids').onclick = ()=>{ r.bidsLocked = false; Storage.setActive(mode,g); render(); };

  } else { // ---- Twist play phase: tap-to-assign drinks, no dropdown ----
    if(!r.giveTo) r.giveTo = Array(n).fill(null);

    const readTr = ()=>{ const t=r.tricks.slice();
      $$('#entry input.trk').forEach(inp=>{ const pi=+inp.dataset.trk; t[pi]= inp.value===''? null : clampInt(inp.value,0,r.cards); });
      return t; };

    // Who is the FIRST made-contract player still waiting on a recipient?
    // (Sequential: resolve one giver at a time, even if several made it.)
    const computeGive = (trLive)=>{
      const madeNow = order.filter(pi=> trLive[pi]!=null && trLive[pi]===r.bids[pi]);
      const gv = r.giveTo;
      const pending = madeNow.filter(pi=> gv[pi]==null);
      return { madeNow, gv, activeGiver: pending.length ? pending[0] : null };
    };

    const promptEl = $('#givePrompt');

    const update = ()=>{
      const tr = readTr();
      const allT = tr.every(x=>x!=null);
      const sumT = tr.reduce((a,x)=>a+(x||0),0);
      const trOk = allT && sumT===r.cards;
      const { madeNow, gv, activeGiver } = computeGive(tr);

      $$('#entry .entry.playphase[data-row]').forEach(row=>{
        const pi = +row.dataset.row;
        const ti = row.querySelector('.trk');
        const made = tr[pi]!=null && tr[pi]===r.bids[pi];
        if(ti){
          ti.classList.toggle('made', made);
          ti.classList.toggle('bad', allT && sumT!==r.cards);
        }
        row.classList.toggle('pickable', activeGiver!=null && pi!==activeGiver);
        const tagEl = row.querySelector('[data-tag]');
        if(tagEl){
          if(made && gv[pi]!=null) tagEl.innerHTML = `<span class="badge give" data-undo="1">&rarr; ${esc(g.players[gv[pi]])} &#127866;</span>`;
          else if(made && activeGiver===pi) tagEl.innerHTML = `<span class="badge made">Made &#127866;</span>`;
          else tagEl.innerHTML = '';
        }
      });

      if(promptEl){
        if(activeGiver!=null){ promptEl.style.display=''; promptEl.innerHTML = `&#127866; <b>${esc(g.players[activeGiver])}</b> made it — tap who gets the drink`; }
        else promptEl.style.display='none';
      }

      const rem = r.cards - sumT;
      const tags = [`<span class="tag ${trOk?'good':(allT?'warn':'info')}">tricks ${sumT} / ${r.cards}</span>`];
      if(allT && sumT!==r.cards) tags.push(`<span class="tag warn">must total ${r.cards} (${rem>0?rem+' short':Math.abs(rem)+' over'})</span>`);
      else if(!allT) tags.push(`<span class="tag info">enter tricks won by each</span>`);
      else if(trOk && madeNow.some(pi=>gv[pi]==null)) tags.push(`<span class="tag warn">tap who gets each made contract's drink</span>`);
      $('#fb').innerHTML = tags.join('');

      const giveOk = madeNow.every(pi=> gv[pi]!=null);
      $('#record').disabled = !(trOk && giveOk);
    };

    $$('#entry input.trk').forEach(inp=>{
      inp.addEventListener('input', ()=>{ update(); focusAdvance($$('#entry input.trk'), inp, r.cards, '#record'); });
      inp.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); focusAdvance($$('#entry input.trk'), inp, r.cards, '#record'); } });
      inp.addEventListener('change', ()=>{ r.tricks = readTr(); Storage.setActive(mode,g); });
    });

    // Tap a row to assign that round's drink — clicking the trick input
    // itself always just focuses/types as normal; tapping anywhere else
    // on an eligible row (their name, badge, blank space) is the "pick".
    panel.addEventListener('click', (e)=>{
      const undo = e.target.closest('[data-undo]');
      if(undo){
        e.stopPropagation();
        const row = undo.closest('[data-row]');
        const pi = +row.dataset.row;
        r.giveTo[pi] = null;
        Storage.setActive(mode,g); update();
        return;
      }
      if(e.target.closest('input')) return;
      const row = e.target.closest('.entry.playphase.pickable[data-row]');
      if(row){
        const targetPi = +row.dataset.row;
        const tr = readTr();
        const { activeGiver } = computeGive(tr);
        if(activeGiver==null || activeGiver===targetPi) return;
        r.giveTo[activeGiver] = targetPi;
        Storage.setActive(mode,g); update();
      }
    });

    update();

    $('#record').onclick = ()=>{
      const tr = readTr();
      if(tr.some(x=>x==null) || tr.reduce((a,x)=>a+(x||0),0)!==r.cards){
        $('#fb').innerHTML = `<span class="tag warn">Tricks must total exactly ${r.cards}.</span>`; return;
      }
      const { madeNow, gv } = computeGive(tr);
      if(madeNow.some(pi=> gv[pi]==null)){
        $('#fb').innerHTML = `<span class="tag warn">Tap who gets each made contract's drink.</span>`; return;
      }
      r.tricks = tr; r.giveTo = gv; r.recorded = true; r.bidsLocked = true;
      state.editing = null; finishIfDone(g,mode); Storage.setActive(mode,g); render();
    };
    $('#editbids').onclick = ()=>{ r.bidsLocked = false; Storage.setActive(mode,g); render(); };
  }
}

function finishIfDone(g, mode){
  if(currentRoundIndex(g)===-1){
    const ld = leaders(g);
    g.finishedAt = new Date().toISOString();
    g.winner = ld.winners.map(i=>g.players[i]).join(" & ");
    Storage.saveGame(mode, g);            // upsert to Hall of Fame
    state.games[mode].push(g);            // refresh cache (upsert-safe enough for view)
  } else if(g.finishedAt){
    // a finished game was re-edited: recompute + re-save
    const ld=leaders(g); g.winner=ld.winners.map(i=>g.players[i]).join(" & "); Storage.saveGame(mode,g);
  }
}

/* ---------------- STATS / HALL OF FAME ---------------- */
// Pick the player who leads a metric, with a minimum-rounds guard for rates.
function leaderOf(players, valFn, minRounds=0){
  let best=null, bv=-Infinity;
  players.forEach(p=>{ if(p.rounds<minRounds) return; const v=valFn(p); if(v>bv){ bv=v; best=p; } });
  return best ? {name:best.name, val:bv} : null;
}

/* ---- Hand-rolled SVG charts (no charting lib — keeps this a single file) ----
   Both read straight off CSS custom properties so they inherit the
   Stout & Cards palette automatically. */

// Horizontal ranked bar chart — one row per item. Used for the leaderboard
// overview and for the player-comparison panel.
function barChartSVG(items, opts={}){
  if(!items.length) return '';
  const W = opts.width || 540;
  const barH = opts.barH || 20;
  const gap = 9;
  const leftW = opts.leftW || 96;
  const rightW = opts.rightW || 46;
  const plotW = Math.max(40, W - leftW - rightW);
  const max = opts.max || Math.max(1, ...items.map(it=>Math.abs(it.value)));
  const H = items.length*(barH+gap) + gap;
  const fmt = opts.valFmt || (v=>v);
  const rows = items.map((it,i)=>{
    const y = gap + i*(barH+gap);
    const w = items[i].value<=0 ? 0 : Math.max(2,(it.value/max)*plotW);
    const fill = it.color || 'var(--gold)';
    return `
      <text x="${leftW-8}" y="${y+barH*0.7}" text-anchor="end" font-family="Space Mono" font-size="11.5" style="fill:var(--head)">${esc(it.label)}</text>
      <rect x="${leftW}" y="${y}" width="${plotW}" height="${barH}" rx="5" style="fill:rgba(239,226,196,.06)"/>
      <rect x="${leftW}" y="${y}" width="${w}" height="${barH}" rx="5" style="fill:${fill}"/>
      <text x="${leftW+plotW+8}" y="${y+barH*0.7}" font-family="Space Mono" font-size="11.5" style="fill:var(--gold)">${esc(String(fmt(it.value)))}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="${esc(opts.label||'chart')}">${rows}</svg>`;
}

// Simple line + dot trend sparkline — a player's score across their games,
// in the order those games were recorded.
function sparklineSVG(values, opts={}){
  if(!values || values.length<2) return `<div class="sub" style="font-style:italic">Not enough games yet for a trend line.</div>`;
  const W = opts.width || 320, H = opts.height || 72, pad = 10;
  const max = Math.max(...values), min = Math.min(...values);
  const range = Math.max(1, max-min);
  const stepX = (W-pad*2)/(values.length-1);
  const pts = values.map((v,i)=> [pad+i*stepX, H-pad-((v-min)/range)*(H-pad*2)]);
  const path = pts.map((p,i)=> (i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const dots = pts.map((p,i)=> i===pts.length-1
    ? `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="4" style="fill:var(--gold)"/>`
    : `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.4" style="fill:var(--ash)"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="score trend">
    <path d="${path}" fill="none" style="stroke:var(--gold-dim);stroke-width:2"/>
    ${dots}
  </svg>`;
}

// Shared "compare players" panel: chip picker (toggle, max 4) + per-metric
// bar charts + a compact stat card per selected player. `metrics` is
// [{label, fmt, fn(player)->number}], `swatches` cycles accent colors.
const COMPARE_MAX = 4;
const COMPARE_SWATCHES = ['var(--gold)','var(--ruby)','#7a9a4e','#5d8aa8'];
function comparePickerHTML(allPlayers, sel){
  const chips = allPlayers.map(p=>{
    const on = sel.includes(p.name);
    const full = !on && sel.length>=COMPARE_MAX;
    return `<button type="button" class="chip" data-cmp="${esc(p.name)}" aria-pressed="${on}" ${full?'disabled':''}>${esc(p.name)}</button>`;
  }).join('');
  return `<div class="chip-row" id="cmpChips">${chips}</div>`;
}
function comparePanelHTML(allPlayers, sel, metrics, mode){
  if(sel.length<2) return `<div class="compare-empty">Pick at least 2 players above to compare them head-to-head.</div>`;
  const ps = sel.map(n=>allPlayers.find(p=>p.name===n)).filter(Boolean);
  const charts = metrics.map(m=>{
    const items = ps.map((p,i)=>({label:p.name, value:m.fn(p), color:COMPARE_SWATCHES[i%COMPARE_SWATCHES.length]}));
    return `<div class="chart-card"><div class="ctitle">${esc(m.label)}</div>${barChartSVG(items,{valFmt:m.fmt,label:m.label})}</div>`;
  }).join('');
  const cards = ps.map((p,i)=>`
    <div class="compare-card" style="--swatch:${COMPARE_SWATCHES[i%COMPARE_SWATCHES.length]}">
      <h4>${esc(p.name)}</h4>
      ${metrics.map(m=>`<div class="crow"><span>${esc(m.label)}</span><b>${esc(String(m.fmt(m.fn(p))))}</b></div>`).join('')}
    </div>`).join('');
  return `${charts}<div class="compare-cards">${cards}</div>`;
}

function viewStats(){
  const sm = state.statMode || "whist";
  const modeSeg = `<div class="seg">
    <button class="btn sm ghost segbtn" data-sm="whist" aria-pressed="${sm==='whist'}">Whist</button>
    <button class="btn sm ghost segbtn" data-sm="twist" aria-pressed="${sm==='twist'}">Twist</button>
  </div>`;
  return sm==="twist" ? viewStatsTwist(modeSeg) : viewStatsWhist(modeSeg);
}

/* ---- Whist stats (rich: trumps, overbids, table-size splits) ---- */
function computeStatsWhist(games, countFilter){
  let fin = games.filter(g=>g.finishedAt);
  const counts = [...new Set(fin.map(g=>g.players.length))].sort((a,b)=>a-b);
  if(countFilter && countFilter!=="all") fin = fin.filter(g=>g.players.length===+countFilter);

  const byName = {};
  const ensure = n => byName[n] || (byName[n]={
    name:n, games:0, wins:0, points:0, bestGame:0,
    rounds:0, contracts:0, busts:0,
    tricksWon:0, tricksAvail:0, bidSum:0, cardSum:0,
    overbids:0, minRaises:0, trumpsPicked:0, trumpsMade:0,
    nilBids:0, nilMade:0, bestHand:0,
    missMarginSum:0,                                  // sum of |bid-tricks| on busted hands -> avg miss margin
    bidErrSum:0,                                       // sum of |bid-tricks| on ALL hands (bid accuracy)
    dealerRounds:0, dealerPts:0, nonDealerRounds:0, nonDealerPts:0, // does the hook punish the dealer?
    trumpsBySuit:{S:0,H:0,D:0,C:0}, trumpsMadeBySuit:{S:0,H:0,D:0,C:0}, // favourite trump suit
    finishSum:0, bestStreak:0,                         // avg finishing position + longest win streak
    winsByCount:{},                                    // wins by player count: {4:3, 5:1, ...}
    gamesByCount:{},                                   // games by player count
    recentPoints:[],                                   // last 5 game scores for "most improved"
    allTimePoints:[]                                   // all game scores for baseline
  });
  let bigRound = {val:-1,name:null,cards:null};
  // Fun-fact trackers (cross-game, computed in the same pass as the per-game loop below)
  let closestGame = {margin:Infinity, champ:null, runner:null, champScore:0, runnerScore:0};
  let blowout     = {margin:-1,       champ:null, runner:null, champScore:0, runnerScore:0};
  let biggestComeback = {val:0, who:null, leader:null};
  // Head-to-head ledger: h2h[a][b] = {w,l,d} from a's perspective vs b
  const h2h = {};
  const h2hRec = (a,b)=> (h2h[a]=h2h[a]||{})[b] = h2h[a][b] || {w:0,l:0,d:0};

  fin.forEach(g=>{
    const t = totals(g);
    const ld = leaders(g);
    const n = g.players.length;
    const sorted = [...t].sort((a,b)=>b-a);

    g.players.forEach((nm,i)=>{
      const s = ensure(nm);
      s.games++; s.points += t[i];
      if(ld.winners.includes(i)) s.wins++;
      if(t[i] > s.bestGame) s.bestGame = t[i];
      s.finishSum += 1 + t.filter(v=>v>t[i]).length;   // standard competition ranking, ties share a place
      const nc = String(n);
      s.gamesByCount[nc] = (s.gamesByCount[nc]||0)+1;
      if(ld.winners.includes(i)) s.winsByCount[nc] = (s.winsByCount[nc]||0)+1;
      s.allTimePoints.push(t[i]);
    });

    // Closest game / biggest blowout — margin between 1st and 2nd place
    if(n>=2){
      const margin = sorted[0]-sorted[1];
      const champs  = g.players.filter((_,i)=>t[i]===sorted[0]).join(" & ");
      const runners = g.players.filter((_,i)=>t[i]===sorted[1]).join(" & ");
      if(margin < closestGame.margin) closestGame = {margin, champ:champs, runner:runners, champScore:sorted[0], runnerScore:sorted[1]};
      if(margin > blowout.margin)     blowout     = {margin, champ:champs, runner:runners, champScore:sorted[0], runnerScore:sorted[1]};
    }

    // Head-to-head — every pair, who finished above whom in this game
    for(let i=0;i<n;i++) for(let j=i+1;j<n;j++){
      const a=g.players[i], b=g.players[j];
      if(t[i]>t[j]){ h2hRec(a,b).w++; h2hRec(b,a).l++; }
      else if(t[i]<t[j]){ h2hRec(a,b).l++; h2hRec(b,a).w++; }
      else { h2hRec(a,b).d++; h2hRec(b,a).d++; }
    }

    g.rounds.forEach(r=>{
      if(!r.recorded) return;
      const hb = highestBidder(g, r);
      g.players.forEach((nm,i)=>{
        const bid = r.bids[i], tr = r.tricks[i];
        if(bid==null || tr==null) return;
        const s = ensure(nm);
        s.rounds++;
        s.tricksWon += tr; s.tricksAvail += r.cards;
        s.bidSum += bid;   s.cardSum += r.cards;
        const rs = roundScore(bid, tr, g.settings);
        if(rs > s.bestHand) s.bestHand = rs;
        if(rs > bigRound.val) bigRound = {val:rs, name:nm, cards:r.cards};
        if(bid===tr) s.contracts++; else { s.busts++; s.missMarginSum += Math.abs(bid-tr); }
        s.bidErrSum += Math.abs(bid-tr);
        if(bid===0){ s.nilBids++; if(tr===0) s.nilMade++; }
        if(i===hb){
          s.trumpsPicked++;
          if(bid===tr) s.trumpsMade++;
          if(r.trumps){
            s.trumpsBySuit[r.trumps] = (s.trumpsBySuit[r.trumps]||0)+1;
            if(bid===tr) s.trumpsMadeBySuit[r.trumps] = (s.trumpsMadeBySuit[r.trumps]||0)+1;
          }
        }
        if(i===r.dealerIndex){ s.dealerRounds++; s.dealerPts += rs; }
        else { s.nonDealerRounds++; s.nonDealerPts += rs; }
      });
      // Overbid pass: walking bid order, who took the lead from a prior bidder?
      let runMax = -1;
      bidOrder(r, n).forEach((pi,k)=>{
        const b = r.bids[pi];
        if(b==null) return;
        if(k>0 && runMax>=0 && b>runMax){
          const s = ensure(g.players[pi]);
          s.overbids++;
          if(b - runMax === 1) s.minRaises++;   // the spiteful +1
        }
        if(b > runMax) runMax = b;
      });
    });

    // Biggest comeback — for the eventual winner(s), the worst deficit they
    // faced (vs whoever was leading at that moment) at any point in the game.
    {
      const cum = Array(n).fill(0);
      const maxDef = Array(n).fill(0);
      const worstLeader = Array(n).fill(null);
      g.rounds.forEach(r=>{
        if(!r.recorded) return;
        r.bids.forEach((_,i)=> cum[i] += roundScore(r.bids[i], r.tricks[i], g.settings));
        const curMax = Math.max(...cum);
        const leadIdx = cum.indexOf(curMax);
        cum.forEach((v,i)=>{
          const d = curMax - v;
          if(d > maxDef[i]){ maxDef[i] = d; worstLeader[i] = g.players[leadIdx]; }
        });
      });
      ld.winners.forEach(wi=>{
        if(maxDef[wi] > biggestComeback.val) biggestComeback = {val:maxDef[wi], who:g.players[wi], leader:worstLeader[wi]};
      });
    }
  });

  // Longest win streak — needs chronological order, so a separate pass.
  const chron = [...fin].sort((a,b)=> new Date(a.finishedAt) - new Date(b.finishedAt));
  const curStreak = {};   // positive = current win streak, negative = loss streak
  chron.forEach(g=>{
    const ld = leaders(g);
    const winSet = new Set(ld.winners.map(i=>g.players[i]));
    g.players.forEach(nm=>{
      const s = ensure(nm);
      if(winSet.has(nm)){
        curStreak[nm] = (curStreak[nm]||0) > 0 ? curStreak[nm]+1 : 1;
        if(curStreak[nm] > s.bestStreak) s.bestStreak = curStreak[nm];
      } else {
        curStreak[nm] = (curStreak[nm]||0) < 0 ? curStreak[nm]-1 : -1;
      }
    });
  });
  // Attach the live active streak to each player object
  Object.values(byName).forEach(p=>{ p.activeStreak = curStreak[p.name] || 0; });

  // Most improved: compare recent-5-game avg vs all-time avg (need >=6 games for meaningful signal)
  Object.values(byName).forEach(p=>{
    if(p.allTimePoints.length < 6){ p.improvement = null; return; }
    const all = p.allTimePoints;
    const recentN = 5;
    const recentAvg = all.slice(-recentN).reduce((a,v)=>a+v,0)/recentN;
    const baselineAvg = all.slice(0,-recentN).reduce((a,v)=>a+v,0)/(all.length-recentN);
    p.improvement = recentAvg - baselineAvg;
    p.recentAvg = recentAvg; p.baselineAvg = baselineAvg;
  });

  // Lucky table size: best win-rate count (min 2 games at that size)
  Object.values(byName).forEach(p=>{
    let bestCount = null, bestRate = -1;
    Object.keys(p.gamesByCount).forEach(nc=>{
      const g = p.gamesByCount[nc], w = p.winsByCount[nc]||0;
      if(g>=2){ const r=w/g; if(r>bestRate||(r===bestRate&&g>(p.gamesByCount[bestCount]||0))){ bestRate=r; bestCount=nc; } }
    });
    p.luckyCount = bestCount ? { count:+bestCount, games:p.gamesByCount[bestCount], wins:p.winsByCount[bestCount]||0, rate:bestRate } : null;
  });

  // Biggest rivalry — the most one-sided head-to-head record, min 3 games together.
  let rivalry = null;
  Object.keys(h2h).forEach(a=>{
    Object.keys(h2h[a]).forEach(b=>{
      if(a >= b) return; // each pair considered once
      const rec = h2h[a][b];
      const total = rec.w+rec.l+rec.d;
      if(total < 3) return;
      const aLeads = rec.w >= rec.l;
      const w = aLeads?rec.w:rec.l, l = aLeads?rec.l:rec.w, d = rec.d;
      const margin = w-l;
      if(margin<=0) return;
      if(!rivalry || margin>rivalry.margin || (margin===rivalry.margin && total>rivalry.total)){
        rivalry = {leader: aLeads?a:b, trail: aLeads?b:a, w, l, d, total};
      }
    });
  });

  const players = Object.values(byName).sort((a,b)=>
    b.wins-a.wins ||
    (b.points/Math.max(1,b.games)) - (a.points/Math.max(1,a.games)) ||
    a.name.localeCompare(b.name));
  const totalRounds = fin.reduce((a,g)=>a+g.rounds.filter(r=>r.recorded).length,0);
  return { players, counts, gamesPlayed:fin.length, totalRounds, bigRound, recent:fin.slice(-6).reverse(),
    closestGame: closestGame.champ ? closestGame : null,
    blowout: (blowout.champ && blowout.margin>0) ? blowout : null,
    comeback: biggestComeback.who ? biggestComeback : null,
    rivalry, h2h
  };
}

function viewStatsWhist(modeSeg){
  const cf = state.statFilter || "all";
  const st = computeStatsWhist(state.games.whist, cf);

  // table-size filter (only shows splits that actually exist in the data)
  const allCounts = computeStatsWhist(state.games.whist, "all").counts;
  const seg = `<div class="seg">
    <button class="btn sm ghost segbtn" data-cf="all" aria-pressed="${cf==='all'}">All tables</button>
    ${allCounts.map(c=>`<button class="btn sm ghost segbtn" data-cf="${c}" aria-pressed="${cf===String(c)}">${c}-player</button>`).join("")}
  </div>`;

  if(st.gamesPlayed===0){
    return `<section class="panel"><h2>Hall of Fame</h2>${modeSeg}${seg}
      <div class="empty">No games on the books${cf!=='all'?` for ${cf}-player tables`:''} yet.<br>Finish a game and your table's all-time record fills in here.</div>
    </section>`;
  }

  const pct = (a,b)=> b? Math.round(a/b*100) : 0;
  const suitSym = {S:'&#9824;',H:'&#9829;',D:'&#9830;',C:'&#9827;'};
  const favSuitOf = p=>{
    let best=null, bv=0;
    Object.keys(p.trumpsBySuit||{}).forEach(k=>{ const v=p.trumpsBySuit[k]; if(v>bv){ bv=v; best=k; } });
    return best ? {suit:best, picks:bv, made:(p.trumpsMadeBySuit&&p.trumpsMadeBySuit[best])||0} : null;
  };

  // Fun-fact tiles — the stories behind the numbers
  const funTiles = [];
  if(st.closestGame) funTiles.push(`<div class="stat"><div class="big">${st.closestGame.margin}</div><div class="lbl">Closest game · ${esc(st.closestGame.champ)} ${st.closestGame.champScore}&ndash;${st.closestGame.runnerScore} ${esc(st.closestGame.runner)}</div></div>`);
  if(st.blowout)     funTiles.push(`<div class="stat"><div class="big">${st.blowout.margin}</div><div class="lbl">Biggest blowout · ${esc(st.blowout.champ)} over ${esc(st.blowout.runner)}</div></div>`);
  if(st.comeback)    funTiles.push(`<div class="stat"><div class="big">${st.comeback.val}</div><div class="lbl">Biggest comeback · ${esc(st.comeback.who)} ran down ${esc(st.comeback.leader)}</div></div>`);

  const stats = `<div class="stat-grid">
    <div class="stat"><div class="big">${st.gamesPlayed}</div><div class="lbl">Games played</div></div>
    <div class="stat"><div class="big">${st.totalRounds}</div><div class="lbl">Hands dealt</div></div>
    <div class="stat"><div class="big">${st.bigRound.val}</div><div class="lbl">Best hand · ${esc(st.bigRound.name||'')}${st.bigRound.cards?` (${st.bigRound.cards}c)`:''}</div></div>
    ${funTiles.join("")}
  </div>`;

  // Table awards — fun superlatives. Rate-based ones get a min-sample guard
  // (8 rounds) so one lucky/unlucky early hand doesn't crown someone.
  const MIN = 8;
  const trumpHog    = leaderOf(st.players, p=>p.trumpsPicked);
  const overlord    = leaderOf(st.players, p=>p.overbids);
  const spite       = leaderOf(st.players, p=>p.minRaises);
  const sharp       = leaderOf(st.players, p=>pct(p.contracts,p.rounds), MIN);
  const bigTalker   = leaderOf(st.players, p=> p.rounds ? (p.bidSum-p.tricksWon)/p.rounds : -Infinity, MIN);
  const sandbagger  = leaderOf(st.players, p=> p.rounds ? (p.tricksWon-p.bidSum)/p.rounds : -Infinity, MIN);
  const bustProne   = leaderOf(st.players, p=> pct(p.busts,p.rounds), MIN);
  const streakStar  = leaderOf(st.players, p=> p.bestStreak||0);
  const mostAccurate= leaderOf(st.players, p=> p.rounds>=MIN ? -(p.bidErrSum/p.rounds) : -Infinity, MIN); // lowest avg error
  const mostImproved= st.players.filter(p=>p.improvement!=null).reduce((best,p)=> p.improvement>(best?.improvement??-Infinity)?p:best, null);

  let dealerCurse = null;
  st.players.forEach(p=>{
    if(p.dealerRounds<4 || p.nonDealerRounds<4) return;
    const dAvg=p.dealerPts/p.dealerRounds, ndAvg=p.nonDealerPts/p.nonDealerRounds;
    const drop = ndAvg-dAvg;
    if(drop>0 && (!dealerCurse || drop>dealerCurse.val)) dealerCurse = {name:p.name, val:drop};
  });

  let suitSpecialist = null;
  st.players.forEach(p=>{
    const f = favSuitOf(p);
    if(!f || f.picks<3) return;
    const rate = Math.round(f.made/f.picks*100);
    if(!suitSpecialist || rate>suitSpecialist.val) suitSpecialist = {name:p.name, suit:f.suit, val:rate};
  });

  const A=[];
  const add=(label, ok, html)=>{ if(ok) A.push(`<li><span>${label}</span><span class="pts">${html}</span></li>`); };
  add('Trump hog',          trumpHog && trumpHog.val>0,          trumpHog && `${esc(trumpHog.name)} · ${trumpHog.val}`);
  add('Most overbids',      overlord && overlord.val>0,          overlord && `${esc(overlord.name)} · ${overlord.val}`);
  add('Spite raises (+1)',  spite && spite.val>0,                spite && `${esc(spite.name)} · ${spite.val}`);
  add('Sharpest shooter',   sharp && sharp.val>0,                sharp && `${esc(sharp.name)} · ${sharp.val}%`);
  add('Most accurate bids', mostAccurate && mostAccurate.rounds>=MIN, mostAccurate && `${esc(mostAccurate.name)} · ${(mostAccurate.bidErrSum/mostAccurate.rounds).toFixed(2)} avg err`);
  add('Big talker',         bigTalker && bigTalker.val>0,        bigTalker && `${esc(bigTalker.name)} · +${bigTalker.val.toFixed(2)}/hand`);
  add('Sandbagger',         sandbagger && sandbagger.val>0,      sandbagger && `${esc(sandbagger.name)} · +${sandbagger.val.toFixed(2)}/hand`);
  add('Bust-prone',         bustProne && bustProne.val>0,         bustProne && `${esc(bustProne.name)} · ${bustProne.val}%`);
  add("Dealer's curse",     !!dealerCurse,                       dealerCurse && `${esc(dealerCurse.name)} · &minus;${dealerCurse.val.toFixed(1)} pts dealing`);
  add('Suit specialist',    !!suitSpecialist,                    suitSpecialist && `${esc(suitSpecialist.name)} · ${suitSym[suitSpecialist.suit]} ${suitSpecialist.val}%`);
  add('Biggest rivalry',    !!st.rivalry,                        st.rivalry && `${esc(st.rivalry.leader)} leads ${esc(st.rivalry.trail)} ${st.rivalry.w}&ndash;${st.rivalry.l}${st.rivalry.d?` (${st.rivalry.d}d)`:''}`);
  add('Most improved',      !!mostImproved && mostImproved.improvement>0.5, mostImproved && `${esc(mostImproved.name)} · +${mostImproved.improvement.toFixed(1)} pts recent`);
  add('Longest win streak', streakStar && streakStar.val>1,      streakStar && `${esc(streakStar.name)} · ${streakStar.val} in a row`);
  const awards = `<ul class="standings" style="max-width:none">${A.join("")}</ul>`;

  // Overview graph — ranks every player by average score per game, so the
  // shape of the table is visible at a glance without reading anyone's
  // full profile.
  const overviewItems = [...st.players]
    .sort((a,b)=> (b.points/Math.max(1,b.games)) - (a.points/Math.max(1,a.games)))
    .map(p=>({label:p.name, value: Math.round(p.points/Math.max(1,p.games))}));
  const overviewChart = `<div class="chart-card"><div class="ctitle">Average score per game</div>${barChartSVG(overviewItems,{valFmt:v=>v,label:'average score'})}</div>`;

  // Compact leaderboard — name, games, avg, best, streak only. Tap a row
  // to drill into that player's full profile (built further below); the
  // detailed bidding/trump/dealer breakdown no longer dumps for everyone
  // by default.
  const hof = st.players.map((p,i)=>{
    const avg = (p.points/Math.max(1,p.games)).toFixed(0);
    const streakTxt = p.activeStreak > 1 ? `🔥 ${p.activeStreak}` : p.activeStreak < -1 ? `❄️ ${Math.abs(p.activeStreak)}` : '';
    return `<li class="hof-row" data-player="${esc(p.name)}" style="cursor:pointer">
      <span class="rk">${i+1}</span>
      <span>
        <span class="nm">${esc(p.name)}</span>${streakTxt?` <span style="font-size:11px">${streakTxt}</span>`:''}
        <br><span class="meta">${p.games} game${p.games===1?'':'s'} · avg ${avg} · best ${p.bestGame}</span>
      </span>
      <span class="w">${p.wins}</span>
      <span class="meta">wins <span class="chev">&rsaquo;</span></span>
    </li>`;
  }).join("");

  const recent = st.recent.map(g=>{
    const d = new Date(g.finishedAt); const t=totals(g);
    const champ = esc(g.winner||''); const top=Math.max(...t);
    return `<li><span class="rk">&#9824;</span><span><span class="nm">${champ}</span><br><span class="meta">${g.players.length}p · ${esc(g.players.join(', '))}</span></span><span class="w">${top}</span><span class="meta">${d.toLocaleDateString()}</span></li>`;
  }).join("");

  // Compare players — pick 2–4 from the current dataset, see them side by
  // side with the same bar-chart treatment as the overview.
  const compareMetrics = [
    {label:'Win %',        fn:p=>pct(p.wins,p.games),               fmt:v=>v+'%'},
    {label:'Avg score',    fn:p=>Math.round(p.points/Math.max(1,p.games)), fmt:v=>v},
    {label:'Contract %',   fn:p=>pct(p.contracts,p.rounds),         fmt:v=>v+'%'},
    {label:'Bust %',       fn:p=>pct(p.busts,p.rounds),             fmt:v=>v+'%'},
    {label:'Tricks won %', fn:p=>pct(p.tricksWon,p.tricksAvail),    fmt:v=>v+'%'}
  ];
  const sectionHead = (title, extraBtn)=> `<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin:18px 0 6px">
    <h3 style="font-family:'Cinzel';font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ash);margin:0">${title}</h3>
    ${extraBtn||''}
  </div>`;
  const playersBlock = state.compareOn
    ? `${sectionHead('Compare players', '<button class="btn ghost sm" id="cmpToggle">Back to list</button>')}
       <div class="picker-hint">Tap up to ${COMPARE_MAX} players to line them up side by side.</div>
       ${comparePickerHTML(st.players, state.compareSel)}
       ${comparePanelHTML(st.players, state.compareSel, compareMetrics, 'whist')}`
    : `${sectionHead('Players', st.players.length>=2 ? '<button class="btn ghost sm" id="cmpToggle">Compare players</button>' : '')}
       <div class="picker-hint">Tap a player to see their full profile.</div>
       <ul class="hof" id="hofList">${hof}</ul>`;

  // Player detail view — everything that used to be dumped into every row
  // of the leaderboard now lives here, behind a tap, plus a score trend.
  let detailSection = '';
  if(state.playerDetail){
    const pd = st.players.find(p=>p.name===state.playerDetail);
    if(pd){
      const avg2       = (pd.points/Math.max(1,pd.games)).toFixed(0);
      const conPct     = pct(pd.contracts, pd.rounds);
      const trkPct     = pct(pd.tricksWon, pd.tricksAvail);
      const trMake     = pct(pd.trumpsMade, pd.trumpsPicked);
      const avgFinish  = pd.games ? (pd.finishSum/pd.games).toFixed(1) : '–';
      const bustPct    = pct(pd.busts, pd.rounds);
      const missAvg    = pd.busts ? (pd.missMarginSum/pd.busts).toFixed(1) : '0.0';
      const bidAccLabel= pd.rounds ? (pd.bidErrSum/pd.rounds).toFixed(2) : '–';
      const diff       = pd.rounds ? (pd.bidSum-pd.tricksWon)/pd.rounds : 0;
      const tendency   = Math.abs(diff)<0.05 ? 'bids true' : (diff>0 ? `overbids ${diff.toFixed(2)}/hand` : `sandbags ${Math.abs(diff).toFixed(2)}/hand`);
      const dAvg       = pd.dealerRounds ? (pd.dealerPts/pd.dealerRounds).toFixed(1) : '–';
      const ndAvg      = pd.nonDealerRounds ? (pd.nonDealerPts/pd.nonDealerRounds).toFixed(1) : '–';
      const fav        = favSuitOf(pd);
      const favTxt     = fav ? `${suitSym[fav.suit]} (${fav.picks} picks, ${Math.round(fav.made/fav.picks*100)}% made)` : 'no clear favourite';
      const hbPct      = pct(pd.trumpsPicked, pd.rounds);
      const zbPct      = pct(pd.nilBids, pd.rounds);
      const countRows = Object.keys(pd.gamesByCount).sort((a,b)=>+a-+b).map(nc=>{
        const g=pd.gamesByCount[nc], w=pd.winsByCount[nc]||0;
        return `<li><span>${nc}-player table</span><span class="pts">${w}W / ${g-w}L of ${g} · ${Math.round(w/g*100)}% win</span></li>`;
      }).join('');
      const h2hRows = st.players.filter(op=>op.name!==pd.name).map(op=>{
        const rec = (st.h2h[pd.name]||{})[op.name];
        if(!rec) return '';
        return `<li><span>${esc(op.name)}</span><span class="pts">${rec.w}W ${rec.l}L${rec.d?' '+rec.d+'D':''}</span></li>`;
      }).filter(Boolean).join('');
      const streakLabel = pd.activeStreak>1?`🔥 ${pd.activeStreak} win streak`:pd.activeStreak<-1?`❄️ ${Math.abs(pd.activeStreak)} game slide`:'No streak';
      const luckyLabel = pd.luckyCount?`${pd.luckyCount.count}-player (${Math.round(pd.luckyCount.rate*100)}% win rate)`:'Not enough data';
      const impLabel = pd.improvement!=null?`${pd.improvement>0?'+':''}${pd.improvement.toFixed(1)} pts (recent ${pd.recentAvg.toFixed(0)} vs baseline ${pd.baselineAvg.toFixed(0)})`:'Need 6+ games';
      detailSection = `<section class="panel" id="playerDetail">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
          <button class="btn ghost sm" id="closeDetail">&larr; Back</button>
          <h2 style="margin:0">${esc(pd.name)}</h2>
        </div>
        <div class="stat-grid">
          <div class="stat"><div class="big">${pd.wins}</div><div class="lbl">Wins of ${pd.games}</div></div>
          <div class="stat"><div class="big">${avg2}</div><div class="lbl">Avg score</div></div>
          <div class="stat"><div class="big">${pd.bestGame}</div><div class="lbl">Best game</div></div>
          <div class="stat"><div class="big">${bidAccLabel}</div><div class="lbl">Bid accuracy (avg err)</div></div>
        </div>
        <div class="stat-grid" style="margin-top:8px">
          <div class="stat"><div class="big" style="font-size:18px">${streakLabel}</div><div class="lbl">Current form</div></div>
          <div class="stat"><div class="big" style="font-size:18px">${luckyLabel}</div><div class="lbl">Lucky table size</div></div>
          <div class="stat"><div class="big" style="font-size:18px">${impLabel}</div><div class="lbl">Most improved?</div></div>
        </div>

        <div class="trend-row"><span class="lbl">Score trend</span><span class="sub" style="margin:0">${pd.allTimePoints.length} game${pd.allTimePoints.length===1?'':'s'} tracked</span></div>
        <div class="chart-card">${sparklineSVG(pd.allTimePoints)}</div>

        <h3 style="font-family:'Cinzel';font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ash);margin:14px 0 6px">Bidding &amp; play</h3>
        <ul class="standings" style="max-width:none">
          <li><span>Contracts made</span><span class="pts">${conPct}% (${pd.contracts}/${pd.rounds})</span></li>
          <li><span>Busted</span><span class="pts">${bustPct}% · avg miss ${missAvg}</span></li>
          <li><span>Bidding tendency</span><span class="pts">${tendency}</span></li>
          <li><span>Zero bids</span><span class="pts">${zbPct}% (${pd.nilMade}/${pd.nilBids} made)</span></li>
          <li><span>Overbids (spite)</span><span class="pts">${pd.overbids} (${pd.minRaises})</span></li>
          <li><span>Highest bidder</span><span class="pts">${hbPct}% of hands · ${trMake}% made</span></li>
          <li><span>Tricks won</span><span class="pts">${trkPct}%</span></li>
          <li><span>Favourite trump</span><span class="pts">${favTxt}</span></li>
          <li><span>Dealing vs not dealing</span><span class="pts">${dAvg} vs ${ndAvg} pts/hand</span></li>
          <li><span>Average finish</span><span class="pts">${avgFinish}</span></li>
        </ul>

        <h3 style="font-family:'Cinzel';font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ash);margin:14px 0 6px">By table size</h3>
        <ul class="standings" style="max-width:none">${countRows||'<li style="color:var(--ash)">No games yet</li>'}</ul>
        <h3 style="font-family:'Cinzel';font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ash);margin:14px 0 6px">Head-to-head record</h3>
        <ul class="standings" style="max-width:none">${h2hRows||'<li style="color:var(--ash)">No shared games recorded</li>'}</ul>
      </section>`;
    }
  }

  return `
    ${detailSection}
    <section class="panel" ${state.playerDetail?'style="display:none"':''}><h2>Hall of Fame</h2>
      <div class="sub">All-time record · ${cf==='all'?'every table':cf+'-player games'}.</div>
      ${modeSeg}
      ${seg}
      <div style="margin-top:14px">${stats}</div>
      ${overviewChart}
      <h3 style="font-family:'Cinzel';font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ash);margin:8px 0 6px">Table awards</h3>
      ${awards}
      ${playersBlock}
    </section>
    <section class="panel" ${(state.playerDetail||state.compareOn)?'style="display:none"':''}><h2>Recent games</h2><ul class="hof">${recent}</ul></section>`;
}

/* ---- Twist stats (drinks, tracked separately, same depth as Whist) ---- */
function computeStatsTwist(games, countFilter){
  let fin = games.filter(g=>g.finishedAt);
  const counts = [...new Set(fin.map(g=>g.players.length))].sort((a,b)=>a-b);
  if(countFilter && countFilter!=="all") fin = fin.filter(g=>g.players.length===+countFilter);

  const byName = {};
  const ensure = n => byName[n] || (byName[n]={
    name:n, games:0, wins:0, points:0, bestGame:0,
    rounds:0, contracts:0, busts:0,
    tricksWon:0, tricksAvail:0, bidSum:0, cardSum:0,
    overbids:0, minRaises:0, trumpsPicked:0, trumpsMade:0,
    nilBids:0, nilMade:0, bestHand:0, missMarginSum:0,
    bidErrSum:0,
    finishSum:0, bestStreak:0,
    drinksDown:0, drinksGiven:0,
    dryRounds:0,                // rounds with 0 drinks taken
    bestDryStreak:0,            // consecutive dry rounds
    winsByCount:{}, gamesByCount:{},
    allTimePoints:[]
  });
  let bigRound = {val:-1,name:null};

  fin.forEach(g=>{
    const t = totals(g);
    const ld = leaders(g);
    const dr = drinkTotals(g);
    const n = g.players.length;

    g.players.forEach((nm,i)=>{
      const s = ensure(nm);
      s.games++; s.points += t[i]; s.drinksDown += dr[i];
      if(ld.winners.includes(i)) s.wins++;
      if(t[i] > s.bestGame) s.bestGame = t[i];
      s.finishSum += 1 + t.filter(v=>v>t[i]).length;
      const nc = String(n);
      s.gamesByCount[nc] = (s.gamesByCount[nc]||0)+1;
      if(ld.winners.includes(i)) s.winsByCount[nc] = (s.winsByCount[nc]||0)+1;
      s.allTimePoints.push(t[i]);
    });

    g.rounds.forEach(r=>{
      if(!r.recorded) return;
      const hb = highestBidder(g, r);
      const rd = roundDrinks(r, g.settings);
      g.players.forEach((nm,i)=>{
        const bid = r.bids[i], tr = r.tricks[i];
        if(bid==null || tr==null) return;
        const s = ensure(nm);
        s.rounds++;
        s.tricksWon += tr; s.tricksAvail += r.cards;
        s.bidSum += bid;   s.cardSum += r.cards;
        const rs = roundScore(bid, tr, g.settings);
        if(rs > s.bestHand) s.bestHand = rs;
        if(rs > bigRound.val) bigRound = {val:rs, name:nm};
        if(bid===tr) s.contracts++; else { s.busts++; s.missMarginSum += Math.abs(bid-tr); }
        s.bidErrSum += Math.abs(bid-tr);
        if(bid===0){ s.nilBids++; if(tr===0) s.nilMade++; }
        if(i===hb){ s.trumpsPicked++; if(bid===tr) s.trumpsMade++; }
        // Dry round tracking
        if(rd[i]===0){ s.dryRounds++; s._dryStreak=(s._dryStreak||0)+1; if(s._dryStreak>s.bestDryStreak) s.bestDryStreak=s._dryStreak; }
        else { s._dryStreak=0; }
      });
      let runMax = -1;
      bidOrder(r, n).forEach((pi,k)=>{
        const b = r.bids[pi];
        if(b==null) return;
        if(k>0 && runMax>=0 && b>runMax){
          const s = ensure(g.players[pi]);
          s.overbids++;
          if(b - runMax === 1) s.minRaises++;
        }
        if(b > runMax) runMax = b;
      });
      (r.giveTo||[]).forEach((target, giverIdx)=>{
        if(target!=null && r.bids[giverIdx]===r.tricks[giverIdx]){
          ensure(g.players[giverIdx]).drinksGiven += (g.settings.makeCount ?? 1);
        }
      });
    });
  });

  const chron = [...fin].sort((a,b)=> new Date(a.finishedAt) - new Date(b.finishedAt));
  const curStreak = {};
  chron.forEach(g=>{
    const ld = leaders(g);
    const winSet = new Set(ld.winners.map(i=>g.players[i]));
    g.players.forEach(nm=>{
      const s = ensure(nm);
      if(winSet.has(nm)){
        curStreak[nm] = (curStreak[nm]||0) > 0 ? curStreak[nm]+1 : 1;
        if(curStreak[nm] > s.bestStreak) s.bestStreak = curStreak[nm];
      } else {
        curStreak[nm] = (curStreak[nm]||0) < 0 ? curStreak[nm]-1 : -1;
      }
    });
  });
  Object.values(byName).forEach(p=>{ p.activeStreak = curStreak[p.name] || 0; });

  // Most improved
  Object.values(byName).forEach(p=>{
    if(p.allTimePoints.length < 6){ p.improvement = null; return; }
    const all = p.allTimePoints; const recentN=5;
    const recentAvg = all.slice(-recentN).reduce((a,v)=>a+v,0)/recentN;
    const baselineAvg = all.slice(0,-recentN).reduce((a,v)=>a+v,0)/(all.length-recentN);
    p.improvement = recentAvg - baselineAvg;
    p.recentAvg = recentAvg; p.baselineAvg = baselineAvg;
  });
  // Lucky table size
  Object.values(byName).forEach(p=>{
    let bestCount=null, bestRate=-1;
    Object.keys(p.gamesByCount).forEach(nc=>{
      const g=p.gamesByCount[nc], w=p.winsByCount[nc]||0;
      if(g>=2){ const r=w/g; if(r>bestRate){ bestRate=r; bestCount=nc; } }
    });
    p.luckyCount = bestCount?{count:+bestCount, games:p.gamesByCount[bestCount], wins:p.winsByCount[bestCount]||0, rate:bestRate}:null;
  });

  const players = Object.values(byName).sort((a,b)=>
    b.wins-a.wins ||
    (b.points/Math.max(1,b.games)) - (a.points/Math.max(1,a.games)) ||
    a.name.localeCompare(b.name));
  const totalRounds = fin.reduce((a,g)=>a+g.rounds.filter(r=>r.recorded).length,0);
  const totalDrinks = players.reduce((a,p)=>a+p.drinksDown,0);
  return { players, counts, gamesPlayed:fin.length, totalRounds, totalDrinks, bigRound, recent:fin.slice(-6).reverse() };
}

function viewStatsTwist(modeSeg){
  const cf = state.statFilterTwist || "all";
  const st = computeStatsTwist(state.games.twist, cf);
  const allCounts = computeStatsTwist(state.games.twist, "all").counts;
  const seg = `<div class="seg">
    <button class="btn sm ghost segbtn" data-cft="all" aria-pressed="${cf==='all'}">All tables</button>
    ${allCounts.map(c=>`<button class="btn sm ghost segbtn" data-cft="${c}" aria-pressed="${cf===String(c)}">${c}-player</button>`).join("")}
  </div>`;

  if(st.gamesPlayed===0){
    return `<section class="panel"><h2>Hall of Fame</h2>${modeSeg}${seg}
      <div class="empty">No Twist games${cf!=='all'?` for ${cf}-player tables`:''} on the books yet.<br>Finish a game and the drink tally fills in here.</div>
    </section>`;
  }

  const pct = (a,b)=> b? Math.round(a/b*100) : 0;
  const stats = `<div class="stat-grid">
    <div class="stat"><div class="big">${st.gamesPlayed}</div><div class="lbl">Games played</div></div>
    <div class="stat"><div class="big">${st.totalRounds}</div><div class="lbl">Hands dealt</div></div>
    <div class="stat"><div class="big">&#127866;${st.totalDrinks}</div><div class="lbl">Drinks poured</div></div>
    <div class="stat"><div class="big">${st.bigRound.val}</div><div class="lbl">Best hand · ${esc(st.bigRound.name||'')}</div></div>
  </div>`;

  const MIN = 8;
  const heaviest = leaderOf(st.players, p=>p.drinksDown);
  const generous = leaderOf(st.players, p=>p.drinksGiven);
  const sharp    = leaderOf(st.players, p=>pct(p.contracts,p.rounds), MIN);
  const bustProne= leaderOf(st.players, p=>pct(p.busts,p.rounds), MIN);
  const streakStar = leaderOf(st.players, p=> p.bestStreak||0);
  const driest   = leaderOf(st.players, p=> p.rounds>=MIN ? pct(p.dryRounds,p.rounds) : -1, MIN);
  const dryStreak= leaderOf(st.players, p=> p.bestDryStreak||0);
  const mostImprovedT= st.players.filter(p=>p.improvement!=null).reduce((best,p)=>p.improvement>(best?.improvement??-Infinity)?p:best, null);
  const A=[];
  const add=(label, ok, html)=>{ if(ok) A.push(`<li><span>${label}</span><span class="pts">${html}</span></li>`); };
  add('Heaviest pour',      heaviest && heaviest.val>0,  heaviest && `${esc(heaviest.name)} · &#127866;${heaviest.val}`);
  add('Most generous',      generous && generous.val>0,  generous && `${esc(generous.name)} · &#127866;${generous.val} handed out`);
  add('Sharpest shooter',   sharp && sharp.val>0,        sharp && `${esc(sharp.name)} · ${sharp.val}%`);
  add('Bust-prone',         bustProne && bustProne.val>0,bustProne && `${esc(bustProne.name)} · ${bustProne.val}%`);
  add('Driest player',      driest && driest.val>0,      driest && `${esc(driest.name)} · ${driest.val}% dry hands`);
  add('Never misses streak',dryStreak && dryStreak.val>2,dryStreak && `${esc(dryStreak.name)} · ${dryStreak.val} straight dry`);
  add('Most improved',      !!mostImprovedT && mostImprovedT.improvement>0.5, mostImprovedT && `${esc(mostImprovedT.name)} · +${mostImprovedT.improvement.toFixed(1)} pts recent`);
  add('Longest win streak', streakStar && streakStar.val>1, streakStar && `${esc(streakStar.name)} · ${streakStar.val} in a row`);
  const awards = `<ul class="standings" style="max-width:none">${A.join("")}</ul>`;

  // Overview graph — drinks poured per game, the signature Twist number.
  const overviewItems = [...st.players]
    .sort((a,b)=> (b.drinksDown/Math.max(1,b.games)) - (a.drinksDown/Math.max(1,a.games)))
    .map(p=>({label:p.name, value: +(p.drinksDown/Math.max(1,p.games)).toFixed(1)}));
  const overviewChart = `<div class="chart-card"><div class="ctitle">&#127866; Drinks per game</div>${barChartSVG(overviewItems,{valFmt:v=>v,label:'drinks per game'})}</div>`;

  // Compact leaderboard — tap a row for the full drink/bid breakdown below.
  const hof = st.players.map((p,i)=>{
    const avg = (p.points/Math.max(1,p.games)).toFixed(0);
    const dph = p.games ? (p.drinksDown/p.games).toFixed(1) : '–';
    const streakTxt = p.activeStreak>1?`🔥 ${p.activeStreak}`:p.activeStreak<-1?`❄️ ${Math.abs(p.activeStreak)}`:'';
    return `<li class="hof-row" data-player="${esc(p.name)}" style="cursor:pointer">
      <span class="rk">${i+1}</span>
      <span>
        <span class="nm">${esc(p.name)}</span>${streakTxt?` <span style="font-size:11px">${streakTxt}</span>`:''}
        <br><span class="meta">${p.games} game${p.games===1?'':'s'} · avg ${avg} · &#127866;${dph}/game</span>
      </span>
      <span class="w">${p.wins}</span>
      <span class="meta">wins <span class="chev">&rsaquo;</span></span>
    </li>`;
  }).join("");

  const recent = st.recent.map(g=>{
    const d = new Date(g.finishedAt); const t=totals(g);
    const champ = esc(g.winner||''); const top=Math.max(...t);
    return `<li><span class="rk">&#9824;</span><span><span class="nm">${champ}</span><br><span class="meta">${g.players.length}p · ${esc(g.players.join(', '))}</span></span><span class="w">${top}</span><span class="meta">${d.toLocaleDateString()}</span></li>`;
  }).join("");

  // Compare players
  const compareMetrics = [
    {label:'Win %',         fn:p=>pct(p.wins,p.games),            fmt:v=>v+'%'},
    {label:'Avg score',     fn:p=>Math.round(p.points/Math.max(1,p.games)), fmt:v=>v},
    {label:'Drinks/game',   fn:p=>+(p.drinksDown/Math.max(1,p.games)).toFixed(1), fmt:v=>v},
    {label:'Contract %',    fn:p=>pct(p.contracts,p.rounds),      fmt:v=>v+'%'},
    {label:'Bust %',        fn:p=>pct(p.busts,p.rounds),          fmt:v=>v+'%'}
  ];
  const sectionHead = (title, extraBtn)=> `<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin:18px 0 6px">
    <h3 style="font-family:'Cinzel';font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ash);margin:0">${title}</h3>
    ${extraBtn||''}
  </div>`;
  const playersBlock = state.compareOn
    ? `${sectionHead('Compare players', '<button class="btn ghost sm" id="cmpToggle">Back to list</button>')}
       <div class="picker-hint">Tap up to ${COMPARE_MAX} players to line them up side by side.</div>
       ${comparePickerHTML(st.players, state.compareSel)}
       ${comparePanelHTML(st.players, state.compareSel, compareMetrics, 'twist')}`
    : `${sectionHead('Players', st.players.length>=2 ? '<button class="btn ghost sm" id="cmpToggle">Compare players</button>' : '')}
       <div class="picker-hint">Tap a player to see their full profile.</div>
       <ul class="hof" id="hofList">${hof}</ul>`;

  // Twist player detail view
  let detailSection = '';
  if(state.playerDetail){
    const pd = st.players.find(p=>p.name===state.playerDetail);
    if(pd){
      const avg2=(pd.points/Math.max(1,pd.games)).toFixed(0);
      const dph = pd.games?(pd.drinksDown/pd.games).toFixed(1):'–';
      const bidAcc = pd.rounds?(pd.bidErrSum/pd.rounds).toFixed(2):'–';
      const conPct = pct(pd.contracts, pd.rounds);
      const trkPct = pct(pd.tricksWon, pd.tricksAvail);
      const hbPct  = pct(pd.trumpsPicked, pd.rounds);
      const zbPct  = pct(pd.nilBids, pd.rounds);
      const bustPct= pct(pd.busts, pd.rounds);
      const dryPct = pct(pd.dryRounds, pd.rounds);
      const countRows = Object.keys(pd.gamesByCount).sort((a,b)=>+a-+b).map(nc=>{
        const g=pd.gamesByCount[nc], w=pd.winsByCount[nc]||0;
        return `<li><span>${nc}-player table</span><span class="pts">${w}W / ${g-w}L of ${g} · ${Math.round(w/g*100)}% win</span></li>`;
      }).join('');
      const streakLabel = pd.activeStreak>1?`🔥 ${pd.activeStreak} win streak`:pd.activeStreak<-1?`❄️ ${Math.abs(pd.activeStreak)} game slide`:'No streak';
      const luckyLabel = pd.luckyCount?`${pd.luckyCount.count}-player (${Math.round(pd.luckyCount.rate*100)}% win rate)`:'Not enough data';
      const impLabel = pd.improvement!=null?`${pd.improvement>0?'+':''}${pd.improvement.toFixed(1)} pts (recent ${pd.recentAvg.toFixed(0)} vs baseline ${pd.baselineAvg.toFixed(0)})`:'Need 6+ games';
      detailSection = `<section class="panel" id="playerDetail">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
          <button class="btn ghost sm" id="closeDetail">&larr; Back</button>
          <h2 style="margin:0">${esc(pd.name)}</h2>
        </div>
        <div class="stat-grid">
          <div class="stat"><div class="big">${pd.wins}</div><div class="lbl">Wins of ${pd.games}</div></div>
          <div class="stat"><div class="big">${avg2}</div><div class="lbl">Avg score</div></div>
          <div class="stat"><div class="big">&#127866;${pd.drinksDown}</div><div class="lbl">Total downed (${dph}/game)</div></div>
          <div class="stat"><div class="big">${bidAcc}</div><div class="lbl">Bid accuracy (avg err)</div></div>
        </div>
        <div class="stat-grid" style="margin-top:8px">
          <div class="stat"><div class="big" style="font-size:18px">${streakLabel}</div><div class="lbl">Current form</div></div>
          <div class="stat"><div class="big" style="font-size:18px">${luckyLabel}</div><div class="lbl">Lucky table size</div></div>
          <div class="stat"><div class="big" style="font-size:18px">${impLabel}</div><div class="lbl">Most improved?</div></div>
          <div class="stat"><div class="big">${pd.bestDryStreak}</div><div class="lbl">Best dry-hand streak</div></div>
        </div>

        <div class="trend-row"><span class="lbl">Score trend</span><span class="sub" style="margin:0">${pd.allTimePoints.length} game${pd.allTimePoints.length===1?'':'s'} tracked</span></div>
        <div class="chart-card">${sparklineSVG(pd.allTimePoints)}</div>

        <h3 style="font-family:'Cinzel';font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ash);margin:14px 0 6px">Bidding &amp; drinking</h3>
        <ul class="standings" style="max-width:none">
          <li><span>Contracts made</span><span class="pts">${conPct}% (${pd.contracts}/${pd.rounds})</span></li>
          <li><span>Busted</span><span class="pts">${bustPct}%</span></li>
          <li><span>Zero bids</span><span class="pts">${zbPct}% (${pd.nilMade}/${pd.nilBids} made)</span></li>
          <li><span>Highest bidder</span><span class="pts">${hbPct}% of hands</span></li>
          <li><span>Tricks won</span><span class="pts">${trkPct}%</span></li>
          <li><span>Drinks handed out</span><span class="pts">&#127866;${pd.drinksGiven}</span></li>
          <li><span>Dry hands</span><span class="pts">${dryPct}% · best run ${pd.bestDryStreak}</span></li>
        </ul>

        <h3 style="font-family:'Cinzel';font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ash);margin:14px 0 6px">By table size</h3>
        <ul class="standings" style="max-width:none">${countRows||'<li style="color:var(--ash)">No games yet</li>'}</ul>
      </section>`;
    }
  }

  return `
    ${detailSection}
    <section class="panel" ${state.playerDetail?'style="display:none"':''}><h2>Hall of Fame</h2>
      <div class="sub">All-time record · Contract Twist (tracked separately from Whist) · ${cf==='all'?'every table':cf+'-player games'}.</div>
      ${modeSeg}
      ${seg}
      <div style="margin-top:14px">${stats}</div>
      ${overviewChart}
      <h3 style="font-family:'Cinzel';font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ash);margin:8px 0 6px">Table awards</h3>
      ${awards}
      ${playersBlock}
    </section>
    <section class="panel" ${(state.playerDetail||state.compareOn)?'style="display:none"':''}><h2>Recent games</h2><ul class="hof">${recent}</ul></section>`;
}

function wireStats(){
  $$('#app [data-cf]').forEach(b=> b.onclick = ()=>{ state.statFilter = b.dataset.cf; state.playerDetail=null; state.compareOn=false; state.compareSel=[]; render(); });
  $$('#app [data-cft]').forEach(b=> b.onclick = ()=>{ state.statFilterTwist = b.dataset.cft; state.playerDetail=null; state.compareOn=false; state.compareSel=[]; render(); });
  $$('#app [data-sm]').forEach(b=> b.onclick = ()=>{ state.statMode = b.dataset.sm; state.playerDetail=null; state.compareOn=false; state.compareSel=[]; render(); });
  $$('#app .hof-row[data-player]').forEach(li=>{ li.onclick = ()=>{ state.playerDetail = li.dataset.player; state.compareOn=false; render(); }; });
  const closeDetail = $('#app #closeDetail');
  if(closeDetail) closeDetail.onclick = ()=>{ state.playerDetail=null; render(); };
  const cmpToggle = $('#app #cmpToggle');
  if(cmpToggle) cmpToggle.onclick = ()=>{ state.compareOn = !state.compareOn; state.playerDetail=null; render(); };
  $$('#app [data-cmp]').forEach(chip=>{
    chip.onclick = ()=>{
      const name = chip.dataset.cmp;
      const i = state.compareSel.indexOf(name);
      if(i>=0) state.compareSel.splice(i,1);
      else if(state.compareSel.length < COMPARE_MAX) state.compareSel.push(name);
      render();
    };
  });
}

boot();
</script>
